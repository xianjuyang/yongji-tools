<script>

if(!Element.prototype.closest){Element.prototype.closest=function(s){var el=this;while(el){if(el.matches(s))return el;el=el.parentElement}return null}}
var S=[{title:"预订餐位",sub:"Reservation",words:[["reservation","预订"],["fully booked","订满"],["outdoor seating","户外座位"],["special occasion","特别场合"],["dress code","着装要求"],["deposit","定金"],["cancellation","取消"],["confirmation","确认"],["peak hours","高峰时段"],["high chair","儿童高椅"],["wheelchair accessible","无障碍"],["private room","包间"],["corkage fee","开瓶费"],["waiting list","候补名单"],["party size","用餐人数"],["available","可用的"]],
conv:[["r","Hello, I would like to book a table for dinner tonight. A table for two at 7:30 PM, please.","你好，我想预订今晚晚餐。两人桌，晚上7:30。"],["s","Let me check... I am sorry, 7:30 is <b class=kw>fully booked</b>. We have a table <b class=kw>available</b> at 8 PM. Would that work?","我查一下…抱歉，7:30订满了。8点有桌。可以吗？"],["u","8 PM is fine. Could we sit in the <b class=kw>outdoor seating</b> area? It looks lovely on the terrace.","8点可以。能坐户外座位区吗？露台看起来很漂亮。"],["s","Yes! I have one table on the terrace. Is it a <b class=kw>special occasion</b> — anniversary or birthday?","有的！露台有一桌。是特别场合吗——纪念日或生日？"],["u","It is my wife's birthday, actually. Could you prepare something special? Maybe a small cake?","其实是我太太生日。能准备点什么特别的吗？小蛋糕？"],["s","Happy birthday to her! I will have the pastry chef prepare a complimentary dessert with a candle.","祝她生日快乐！我让甜点主厨准备一份免费甜点配蜡烛。"],["u","That is so kind — thank you! Is there a <b class=kw>dress code</b> for dinner?","太好了——谢谢！晚餐有着装要求吗？"],["s","Smart casual please — no shorts. Your table is confirmed for 8 PM on the terrace.","时尚休闲——不要短裤。露台8点已确认。"]]},
{title:"点餐与推荐",sub:"Ordering",words:[["starter","前菜"],["main course","主菜"],["special","特选"],["chef recommendation","主厨推荐"],["signature dish","招牌菜"],["steak","牛排"],["medium rare","五分熟"],["well done","全熟"],["side dish","配菜"],["dressing","酱汁"],["substitute","替换"],["portion","份量"],["wine menu","酒单"],["dessert","甜点"],["glass of","一杯"],["sparkling water","气泡水"]],
conv:[["r","Everything looks delicious! What do you recommend? Is there a <b class=kw>signature dish</b>?","每样看起来都好吃！你推荐什么？有招牌菜吗？"],["s","Our <b class=kw>signature dish</b> is the slow-braised lamb shank. Tonight's <b class=kw>special</b> is grilled salmon with lemon butter.","招牌菜是慢炖羊腿。今晚特选是柠檬黄油烤三文鱼。"],["u","The lamb shank sounds wonderful. I will have that. What does it come with?","羊腿听起来很棒。我要这个。配什么菜？"],["s","It comes with mashed potatoes and grilled asparagus. Would you like a <b class=kw>starter</b>? The mushroom soup is popular.","配土豆泥和烤芦笋。要前菜吗？蘑菇汤很受欢迎。"],["u","Yes, I will try the mushroom soup. And a <b class=kw>glass of</b> red wine, please. For my wife, she will have the salmon.","好，试试蘑菇汤。再来一杯红酒。我太太要三文鱼。"],["s","Excellent choices! Can I have the <b class=kw>dressing</b> on the side for the salad? I will put your order in now.","好选择！沙拉的酱汁可以另放吗？现在下单。"]]},
{title:"特殊饮食需求",sub:"Dietary Needs",words:[["allergy","过敏"],["allergic to","对…过敏"],["nuts","坚果"],["dairy","乳制品"],["gluten-free","无麸质"],["vegan","纯素"],["vegetarian","素食"],["ingredient","成分"],["separately","分开"],["modify","调整"],["contain","含有"],["lactose intolerant","乳糖不耐"],["food safety","食品安全"],["cross-contamination","交叉污染"]],
conv:[["r","Before we order, I should mention — I am <b class=kw>allergic to</b> <b class=kw>nuts</b>. Is that something you can handle?","点餐前说明一下——我对坚果过敏。你们能处理吗？"],["s","Absolutely. I will mark every dish as nut-free. The kitchen will use separate utensils. Anyone else with allergies?","当然。每道菜标注无坚果，厨房用独立厨具。还有人对什么过敏吗？"],["u","My wife is <b class=kw>lactose intolerant</b> — she cannot have <b class=kw>dairy</b> at all. Can you <b class=kw>modify</b> her dishes?","我太太乳糖不耐受——完全不能吃乳制品。能调整她的菜吗？"],["s","Yes, we can substitute olive oil for butter and remove any cheese or cream. I will make a note for the kitchen.","可以，用橄榄油替代黄油，去掉芝士和奶油。我给厨房备注。"],["u","Thank you for being so careful. Does the mushroom soup <b class=kw>contain</b> any cream or butter?","谢谢你们这么细心。蘑菇汤含奶油或黄油吗？"],["s","It does contain a little cream. But I can ask the chef to make a <b class=kw>dairy</b>-free version.","确实含少量奶油。但我可以让主厨给您太太做无乳版本。"],["u","Perfect! And my lamb — that is nut-free, correct?","完美！我的羊腿——不含坚果，对吧？"],["s","Correct, the lamb is completely nut-free. You are in safe hands — we take <b class=kw>food safety</b> very seriously.","对，羊腿完全不含坚果。请放心——我们非常重视食品安全。"]]},
{title:"用餐中服务",sub:"During Meal",words:[["everything okay","都还好吗"],["enjoying","享受"],["refill","续杯"],["clear the plates","收盘子"],["pepper","胡椒"],["more bread","加面包"],["taste","尝起来"],["delicious","美味"],["compliments to the chef","向主厨致敬"],["another round","再来一轮"],["cocktail","鸡尾酒"],["check back","回访"],["napkin","餐巾"],["fresh one","新的"],["still working on","还在吃"]],
conv:[["u","Excuse me, could I have some <b class=kw>more bread</b>, please? And a <b class=kw>refill</b> of water.","打扰一下，能加些面包吗？再来点水。"],["s","Of course! I will bring fresh bread right away. Is <b class=kw>everything okay</b> with your meal?","当然！马上送新鲜面包。其他菜品都还好吗？"],["u","Yes, the lamb is absolutely <b class=kw>delicious</b>! Please send my <b class=kw>compliments to the chef</b>.","是的，羊腿好吃极了！请向主厨转达我的赞美。"],["s","I will! The chef will be very happy to hear that. Would you like <b class=kw>another round</b> of drinks?","会的！主厨听到会很开心的。要再来一轮饮品吗？"],["u","Just water for now, thank you. Actually, I just dropped my fork — could I have a <b class=kw>fresh one</b>?","现在只要水，谢谢。其实我刚掉了叉子——能换把新的吗？"],["s","Right away! Here you go. Take your time — I will <b class=kw>check back</b> in a few minutes.","马上！给您。慢慢吃——我过几分钟再来看看。"]]},
{title:"结账买单",sub:"Paying",words:[["bill","账单"],["check please","买单"],["service charge","服务费"],["included","已包含"],["tip","小费"],["credit card","信用卡"],["split the bill","分账"],["cash","现金"],["change","找零"],["receipt","收据"],["PIN number","密码"],["contactless","免接触支付"],["machine","刷卡机"],["approve","批准"],["declined","被拒"],["separate checks","分开结"]],
conv:[["r","Excuse me, could we have the <b class=kw>bill</b>, please? All together on one check.","打扰一下，买单。一起结。"],["s","Of course. Here you are. The <b class=kw>service charge</b> is already <b class=kw>included</b> at 10 percent.","好的，给您。服务费10%已包含。"],["u","Is the <b class=kw>tip</b> also <b class=kw>included</b> in the service charge, or should I add extra?","小费也含在服务费里了，还是要额外加？"],["s","The <b class=kw>service charge</b> covers the <b class=kw>tip</b>. But you are welcome to add more. Cash or card?","服务费覆盖了小费。但想多给也欢迎。现金还是刷卡？"],["u","Card, please. Can I tap to pay — do you have <b class=kw>contactless</b>?","刷卡。能免接触支付吗？"],["s","Yes, just tap here. Enter your <b class=kw>PIN number</b>... Approved! Here is your <b class=kw>receipt</b>.","可以，这里轻触。输密码……通过了！这是收据。"],["u","Thank you! The meal was wonderful. We will definitely come back.","谢谢！这顿饭太棒了。下次来一定再来。"]]},
{title:"快餐与小吃",sub:"Fast Food",words:[["takeaway","外卖"],["dine in","堂食"],["combo meal","套餐"],["burger","汉堡"],["fries","薯条"],["drink","饮料"],["extra cheese","加芝士"],["ketchup","番茄酱"],["mustard","芥末酱"],["mayonnaise","蛋黄酱"],["spicy","辣"],["mild","微辣"],["food truck","餐车"],["street food","街头小吃"],["napkin","餐巾纸"],["plastic fork","塑料叉"]],
conv:[["r","Hi! I will have a <b class=kw>combo meal</b> — <b class=kw>burger</b> with <b class=kw>fries</b> and a cola, please. For here.","嗨！我要一个套餐——汉堡配薯条和可乐。堂食。"],["s","Sure! Any <b class=kw>extra cheese</b> on the <b class=kw>burger</b>?","好的！汉堡加芝士吗？"],["u","<b class=kw>Extra cheese</b> would be great. Cola, please. Can I have <b class=kw>ketchup</b> and <b class=kw>mustard</b> on the side?","加芝士好。可乐。能另外给番茄酱和芥末酱吗？"],["s","Of course! <b class=kw>Ketchup</b> and <b class=kw>mustard</b> are right here. Your total is 12 dollars.","当然！番茄酱和芥末酱在这里。一共12美元。"],["u","By the way, is there any <b class=kw>street food</b> market nearby? I want to try local snacks.","对了，附近有街头小吃市场吗？我想尝尝本地小吃。"],["s","Yes! There is a great <b class=kw>food truck</b> park three blocks down. The taco truck is amazing — open until 10 PM.","有！三个街区外有很棒的餐车公园。墨西哥卷饼车特别好吃——开到晚10点。"],["u","Sounds perfect! I will check that out tonight. Thank you!","听起来完美！今晚就去。谢谢！"]]}];
var cur=0;function spk(t){try{if(!window.speechSynthesis)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.85;speechSynthesis.speak(u)}catch(e){}}
function bn(){var h='';for(var i=0;i<S.length;i++)h+='<button class="'+(i===0?'sel':'')+'" data-sc="'+i+'">'+S[i].title+'</button>';document.getElementById('sb').innerHTML=h;document.getElementById('sb').addEventListener('click',function(e){if(e.target.tagName==='BUTTON'){cur=parseInt(e.target.getAttribute('data-sc'));document.querySelectorAll('.bar button').forEach(function(b,j){b.className=j===cur?'sel':''});r()}})}
function r(){var s=S[cur];var h='<h2>📍 '+s.title+'</h2><div class="sub">'+s.sub+' &mdash; '+s.conv.length+'轮 | '+s.words.length+'词</div>';
for(var i=0;i<s.conv.length;i++){var t=s.conv[i],id='t'+i;if(t[0]==='r'){h+='<div class="turn-r" data-en="'+t[1].replace(/\"/g,'&quot;')+'"><span class="sp">📖 礼貌表达（参考）</span>'+t[1]+'<div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文翻译</button><button data-a="sp" data-i="'+id+'">🔊 朗读</button></div><div class="ab" id="cn'+id+'">'+t[2]+'</div></div>'}else if(t[0]==='s'){h+='<div class="turn-sf" data-en="'+t[1].replace(/\"/g,'&quot;')+'"><div class="av">💼</div><div class="bb"><span class="sp">工作人员</span>'+t[1]+'<div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文翻译</button><button data-a="sp" data-i="'+id+'">🔊</button></div><div class="ab" id="cn'+id+'">'+t[2]+'</div></div></div>'}else{h+='<div class="turn-st"><div class="av">🎓</div><div class="bb"><span class="sp">你来说</span><span style="color:#999;font-size:.7em"> 先试着说，想不出再点提示</span><div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文提示</button><button data-a="en" data-i="'+id+'">🔤 英文答案</button><button data-a="sp" data-i="'+id+'">🔊 朗读</button></div><div class="ab" id="cn'+id+'">💬 '+t[2]+'</div><div class="ab" id="en'+id+'">✅ '+t[1]+'</div></div></div>'}}document.getElementById('co').innerHTML=h;
document.getElementById('co').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var a=b.getAttribute('data-a'),i=b.getAttribute('data-i');if(a==='cn'){var el=document.getElementById('cn'+i);if(el)el.classList.toggle('show')}else if(a==='en'){var el=document.getElementById('en'+i);if(el)el.classList.toggle('show')}else if(a==='sp'){var enEl=document.getElementById('en'+i);var txt=enEl?enEl.textContent.replace('✅ ','').trim():'';if(txt)spk(txt.replace(/<[^>]+>/g,''));else{var cnEl=document.getElementById('cn'+i);if(cnEl)spk(cnEl.textContent)}}});
var wh='<h3>📝 核心词汇（'+s.words.length+'个）<br><small style="font-weight:normal;color:#888">点击听发音</small></h3>';for(var k=0;k<s.words.length;k++){wh+='<div class="wrow"><div><span class="en">'+s.words[k][0]+'</span><br><span class="cn">'+s.words[k][1]+'</span></div></div>'}document.getElementById('wp').innerHTML=wh;document.getElementById('wp').addEventListener('click',function(e){var r=e.target.closest('.wrow');if(r){var w=r.querySelector('.en').textContent;spk(w)}})}
bn();r();</script></body></html>
