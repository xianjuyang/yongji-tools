<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>自然拼读规则大全 — Phonics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4ff;color:#2d3748;line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:16px;margin-bottom:24px}
header h1{font-size:2em;margin-bottom:8px}
header p{opacity:.9}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;position:sticky;top:10px;z-index:100}
.tab{padding:10px 18px;background:#fff;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s;white-space:nowrap}
.tab:hover{background:#667eea;color:#fff;border-color:#667eea}
.tab.active{background:#667eea;color:#fff;border-color:#667eea}
.rule-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #667eea}
.rule-card h3{color:#667eea;font-size:1.2em;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.desc{color:#4a5568;margin-bottom:12px;font-size:.95em}
.examples{display:flex;flex-wrap:wrap;gap:8px}
.example-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.95em;transition:all .2s}
.example-btn:hover{background:#667eea;color:#fff;border-color:#667eea}
.example-btn .word{font-weight:600}
.example-btn .ipa{color:#a0aec0;font-size:.8em}
.reading-passage{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.reading-passage h3{color:#764ba2;margin-bottom:12px}
.level{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8em;font-weight:600;margin:0 0 12px 8px}
.level.easy{background:#c6f6d5;color:#276749}
.level.medium{background:#fefcbf;color:#975a16}
.level.hard{background:#fed7d7;color:#9b2c2c}
.passage-text{font-size:1.15em;line-height:2.2;margin:16px 0;padding:16px;background:#f7fafc;border-radius:8px}
.passage-text span{cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .2s}
.passage-text span:hover{background:#667eea;color:#fff}
.read-btn{padding:10px 24px;background:#764ba2;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1em;font-weight:600;transition:all .2s}
.read-btn:hover{background:#667eea}
.search-box{width:100%;padding:14px 20px;border:2px solid #e2e8f0;border-radius:12px;font-size:1em;margin-bottom:20px;outline:none}
.search-box:focus{border-color:#667eea}
.category-title{font-size:1.3em;color:#4a5568;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
@media(max-width:768px){.tabs{overflow-x:auto;flex-wrap:nowrap}.tab{font-size:.8em;padding:8px 12px}header h1{font-size:1.4em}.example-btn{font-size:.85em}}
</style>
</head>

// ============ 核心功能 ============
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function buildTabs() {
  const cats = [...new Set(RULES.map(r=>r.cat)), '诵读文章'];
  document.getElementById('tabs').innerHTML = cats.map((c,i)=>`<div class="tab${i===0?' active':''}" onclick="switchTab('${c}',this)">${c}</div>`).join('');
}

function switchTab(cat,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(cat==='诵读文章') return renderPassages();
  renderRules(cat);
}

function renderRules(cat) {
  document.getElementById('content').innerHTML = '<h2 class="category-title">'+cat+'</h2>' +
  RULES.filter(r=>r.cat===cat).map(r=>`
    <div class="rule-card">
      <h3>${r.title} <button class="read-btn" style="font-size:.8em;padding:6px 12px" onclick="event.stopPropagation();speak('${r.eg[0].w}')">🔊 听示范发音</button></h3>
      <p class="desc">${r.desc}</p>
      <div class="examples">${r.eg.map(e=>`<button class="example-btn" onclick="event.stopPropagation();speak('${e.w}')"><span>🔊</span><span class="word">${e.w}</span><span class="ipa">${e.i}</span><span style="color:#718096;font-size:.85em">${e.m}</span></button>`).join('')}</div>
    </div>`).join('');
}

function renderPassages() {
  document.getElementById('content').innerHTML = '<h2 class="category-title">📖 进阶诵读文章</h2>' +
  PASSAGES.map((p,i)=>`
    <div class="reading-passage">
      <h3>${p.title}<span class="level ${p.level}">${p.level==='easy'?'⭐ 入门':p.level==='medium'?'⭐⭐ 进阶':'⭐⭐⭐ 高级'}</span></h3>
      <div class="passage-text">${p.text.split(' ').map(w=>`<span onclick="event.stopPropagation();speak('${w.replace(/[.,!?;:]/g,'')}')" title="点击朗读">${w}</span>`).join(' ')}</div>
      <button class="read-btn" onclick="event.stopPropagation();speak(\`${p.text}\`)">🔊 朗读全文</button>
    </div>`).join('');
}

function filterRules() {
  const q = document.getElementById('search').value.toLowerCase();
  if(!q) return renderRules('短元音');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const matches = RULES.filter(r=>r.title.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||r.eg.some(e=>e.w.includes(q)||e.m.includes(q)));
  document.getElementById('content').innerHTML = '<h2 class="category-title">🔍 搜索: '+q+' ('+matches.length+'条)</h2>'+
  (matches.length?matches.map(r=>`
    <div class="rule-card">
      <h3>${r.title} <span style="color:#a0aec0;font-size:.8em">[${r.cat}]</span></h3>
      <p class="desc">${r.desc}</p>
      <div class="examples">${r.eg.filter(e=>!q||e.w.includes(q)||e.m.includes(q)||r.title.toLowerCase().includes(q)).map(e=>`<button class="example-btn" onclick="event.stopPropagation();speak('${e.w}')"><span>🔊</span><span class="word">${e.w}</span><span class="ipa">${e.i}</span><span style="color:#718096;font-size:.85em">${e.m}</span></button>`).join('')}</div>
    </div>`).join(''):'<p style="text-align:center;color:#a0aec0;padding:60px">未找到匹配结果，试试其他关键词</p>');
}

// 初始化
buildTabs();
renderRules('短元音');
</script>
</body>
