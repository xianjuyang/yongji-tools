// ==================== RENDER ====================
var curTopic = 0;

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderTopicBar(){
  var h = '';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic-1+DATA.length)%DATA.length+')" title="上一课">←</button>';
  h += '<select onchange="pickTopic(parseInt(this.value))">';
  for(var i=0;i<DATA.length;i++){
    h += '<option value="'+i+'"'+(i===curTopic?' selected':'')+'>'+(i+1)+'. '+esc(DATA[i].title)+'</option>';
  }
  h += '</select>';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic+1)%DATA.length+')" title="下一课">→</button>';
  h += '<div class="progress" style="display:none"></div>';
  document.getElementById('topicBar').innerHTML = h;
}

function pickTopic(i){
  curTopic = i;
  renderTopicBar();
  renderTopic();
  window.scrollTo({top:0,behavior:'smooth'});
  if(window._testMode) startTest();
}

function renderTopic(){
  var t = DATA[curTopic];
  document.getElementById('topicTitle').textContent = (curTopic+1)+'. '+t.title;

  var h = '';

  // Section 1: Core Words
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🧠 核心词汇（10个）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">📖 '+t.grammarLabel+'</div>';
  h += '<div class="word-grid">';
  t.coreWords.forEach(function(w){
    h += '<div class="word-chip"><button class="spk" data-w="'+esc(w[0])+'">🔊</button><span class="en">'+esc(w[0])+'</span><span class="cn">'+esc(w[1])+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 2: Grammar Sentences
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>📝 语法例句（5句）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">'+t.grammar+'</div><div class="sentence-list">';
  t.sentences.forEach(function(s){
    h += '<div class="sent">'+s.en+'<span class="cn">'+esc(s.cn)+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 3: Sentence Practice
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>✏️ 造句练习</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd">';
  t.practice.forEach(function(p,pIdx){
    h += '<div class="practice-item" id="practice-'+pIdx+'">';
    h += '<div class="prompt">'+esc(p.prompt)+'</div>';
    var parts = p.template.split('___');
    var blanks = '<span class="blanks">';
    for(var pi=0; pi<parts.length; pi++){
      blanks += esc(parts[pi]);
      if(pi < parts.length-1){
        blanks += '<span class="gap" id="gap-'+pIdx+'-'+pi+'" onclick="fillGap('+pIdx+','+pi+')">______</span>';
      }
    }
    blanks += '</span>';
    h += blanks;
    h += '<div class="choices" id="choices-'+pIdx+'">';
    p.words.forEach(function(w){
      h += '<button id="btn-'+pIdx+'-'+esc(w)+'" onclick="pickWord('+pIdx+',\''+esc(w)+'\')">'+esc(w)+'</button>';
    });
    h += '</div></div>';
  });
  h += '</div></div>';

  // Section 4: Expression Challenge
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🗣️ 表达挑战</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="express-box">';
  h += '<div class="prompt">'+esc(t.express.prompt)+'</div>';
  h += '<div class="words-hint">可用词汇：<b>'+t.express.words.map(esc).join(' &nbsp;·&nbsp; ')+'</b></div>';
  h += '</div></div></div>';

  // Section 5: Flashcard Test
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🎯 闪卡测试（10词）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div id="testArea"><button onclick="startTest()" style="padding:10px 24px;border-radius:20px;border:none;background:#1a6b5a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">开始测试</button></div></div></div>';

  document.getElementById('main').innerHTML = h;

  // Rebind speak buttons
  document.querySelectorAll('.spk').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var w = this.getAttribute('data-w');
      if(!w||!window.speechSynthesis)return;
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
      speechSynthesis.speak(u);
    });
  });
}

// ==================== SENTENCE PRACTICE ====================
function fillGap(pIdx,gIdx){
  var gap = document.getElementById('gap-'+pIdx+'-'+gIdx);
  if(!gap||gap.classList.contains('filled'))return;
}

function pickWord(pIdx,word){
  var key = pIdx+'-'+word;
  var btn = document.getElementById('btn-'+key);
  if(!btn||btn.classList.contains('used'))return;

  var gaps = document.querySelectorAll('[id^="gap-'+pIdx+'-"]');
  for(var g=0;g<gaps.length;g++){
    if(!gaps[g].classList.contains('filled')){
      gaps[g].textContent = word;
      gaps[g].classList.add('filled');
      btn.classList.add('used');
      break;
    }
  }

  var allFilled = true;
  for(var g2=0;g2<gaps.length;g2++){
    if(!gaps[g2].classList.contains('filled')){allFilled=false;break;}
  }
  if(allFilled){
    var practiceBox = document.getElementById('practice-'+pIdx);
    if(practiceBox) practiceBox.style.borderColor = '#16a34a';
  }
}

// ==================== FLASHCARD TEST ====================
window._testMode = false;
var tw=[],ti=0,tok=0,tfail=0,shown=false;

function startTest(){
  window._testMode = true;
  tw = DATA[curTopic].coreWords.slice();
  tw.sort(function(){return Math.random()-0.5});
  ti=0;tok=0;tfail=0;shown=false;
  updateTestStats();
  showCard();
}

function updateTestStats(){
  var done = tok+tfail, rem = tw.length-ti;
  var total = tok+tfail+rem;
  var h = '<div class="test-stats">';
  h += '<div class="st"><div class="n">'+rem+'</div><div class="l">剩余</div></div>';
  h += '<div class="st"><div class="n" style="color:#16a34a">'+tok+'</div><div class="l">✓</div></div>';
  h += '<div class="st"><div class="n" style="color:#dc2626">'+tfail+'</div><div class="l">✗</div></div>';
  h += '<div class="st"><div class="n">'+(done?Math.round(done/total*100):0)+'%</div><div class="l">进度</div></div>';
  h += '</div><div id="cardArea"></div><div class="test-btns" id="testBtns"></div>';
  document.getElementById('testArea').innerHTML = h;
}

function showCard(){
  if(ti>=tw.length){
    var rate = (tok+tfail)?Math.round(tok/(tok+tfail)*100):0;
    document.getElementById('cardArea').innerHTML = '<div class="stats-done"><div class="emoji">'+(rate>=80?'🎉':rate>=50?'💪':'📖')+'</div><h3>完成！</h3><div class="rate" style="color:'+(rate>=60?'#16a34a':'#dc2626')+'">'+rate+'%</div><p style="color:#888">正确 '+tok+' / 错误 '+tfail+'</p><button onclick="startTest()" style="margin-top:8px;padding:8px 24px;border-radius:16px;border:none;background:#1a6b5a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit">🔄 再来一轮</button></div>';
    document.getElementById('testBtns').innerHTML = '';
    return;
  }
  var w = tw[ti];shown=false;
  document.getElementById('cardArea').innerHTML = '<div class="fc" id="fc" onclick="reveal()"><button class="fc-spk" data-w="'+esc(w[0])+'" onclick="event.stopPropagation();speakWord(\''+esc(w[0])+'\')">🔊</button><div class="ew">'+esc(w[0])+'</div><div class="cn-hidden" id="cnHidden">'+esc(w[1])+'</div><div class="tap">👆 点击查看中文</div></div>';
  document.getElementById('testBtns').innerHTML = '<button class="btn-no" onclick="mark(false)">不认识</button><button class="btn-yes" onclick="mark(true)">认识</button>';
}

function reveal(){
  if(shown)return;shown=true;
  var cn = document.getElementById('cnHidden');
  if(cn)cn.style.display='block';
  var fc = document.getElementById('fc');
  if(fc)fc.classList.add('reveal');
}

function mark(ok){
  if(!shown){reveal();return;}
  if(ok)tok++;else tfail++;
  ti++;
  updateTestStats();
  showCard();
}

function speakWord(w){
  if(!w||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
  speechSynthesis.speak(u);
}

// ==================== INIT ====================
renderTopicBar();
renderTopic();
</script>
