.word-chip .spk:hover{background:#1a6b5a;color:#fff;border-color:#1a6b5a}

.practice-item .choices button:hover{background:#1a6b5a;color:#fff}

.test-stats .st .n{font-size:18px;font-weight:700;color:#2563eb}

<script>
// ==================== STAGE 2 DATA (V3 — B1 进阶表达期) ====================
var DATA = [
{title:"我去北京之前已经学过英语了",grammar:"had + 过去分词<br><small>I had learned… / She had already left… / They hadn't finished yet.</small>",grammarLabel:"时态②：过去完成时（Past Perfect）",
coreWords:[["already","已经"],["learn","学习"],["arrive","到达"],["travel","旅行"],["experience","经历"],["prepare","准备"],["visit","参观"],["realise","意识到"],["trip","旅程"],["before","之前"]],
sentences:[
  {en:"Before I <b>travelled</b> to Beijing, I <b>had</b> already <b>learned</b> English for two years.",cn:"在我去北京旅行之前，我已经学过两年英语了。"},
  {en:"She <b>had</b> already <b>arrived</b> at the station when I called her.",cn:"我给她打电话时，她已经到车站了。（had + 过去分词）"},
  {en:"We <b>had</b> not <b>prepared</b> enough food before the <b>trip</b> started.",cn:"旅行开始前，我们没有准备足够的食物。（hadn't + 过去分词）"},
  {en:"<b>Had</b> you ever <b>visited</b> the Great Wall <b>before</b> last summer?",cn:"去年夏天之前，你参观过长城吗？（Had + 主语 + 过去分词）"},
  {en:"I <b>realised</b> I <b>had</b> left my ticket at home — what a terrible <b>experience</b>!",cn:"我意识到把票落在家里了——多么糟糕的经历！（先发生后意识到）"}
],
practice:[
  {prompt:"用过去完成时（had + 过去分词）完成句子:",template:"Before she arrived, I ___ already ___ my homework.",words:["had","finished"]},
  {prompt:"填入正确的过去完成时形式:",template:"They ___ not ___（see）the movie before last weekend.",words:["had","seen"]}
],
express:{prompt:"用过去完成时说说你上初中之前已经做过的事（3-4句话）:",words:["already","learn","visit","before"]}
},

{title:"那件事发生在什么时候",grammar:"一般过去 vs 过去进行 vs 过去完成<br><small>I walked… / I was walking… / I had walked…</small>",grammarLabel:"时态③：三大过去时态对比",
coreWords:[["happen","发生"],["suddenly","突然"],["while","当…时"],["still","仍然"],["accident","事故"],["realise","意识到"],["moment","时刻"],["explain","解释"],["surprise","惊讶"],["weather","天气"]],
sentences:[
  {en:"The <b>accident</b> <b>happened</b> when I was walking to school.（一般过去 + 过去进行）",cn:"事故发生时我正在走去学校。"},
  {en:"<b>While</b> my mother was cooking, my father <b>was</b> <b>still</b> reading the newspaper.",cn:"我妈妈在做饭时，我爸爸还在看报纸。（两个过去进行同时）"},
  {en:"I <b>realised</b> I <b>had</b> forgotten my keys after I closed the door.",cn:"关上门后我意识到忘了带钥匙。（先忘后意识到→过去完成）"},
  {en:"<b>Suddenly</b>, the <b>weather</b> changed and it started to rain heavily.",cn:"突然，天气变了，下起了大雨。（一般过去叙事）"},
  {en:"At that <b>moment</b>, she <b>was</b> trying to <b>explain</b> what <b>had</b> <b>happened</b>.",cn:"在那一刻，她正在试着解释发生了什么。（三时态同框）"}
],
practice:[
  {prompt:"选择正确的时态（一般过去/过去进行/过去完成）:",template:"While I ___（walk）home, I ___（see）an accident.",words:["was walking","saw"]},
  {prompt:"用正确的过去时态完成:",template:"She ___（already leave）when I ___（arrive）at the party.",words:["had already left","arrived"]}
],
express:{prompt:"用至少两种过去时态讲述一件上周发生的意外小事:",words:["happen","suddenly","while","moment"]}
},

{title:"我下周要去旅行",grammar:"will + V原<br><small>I will travel… / She will not come… / Will you join…?</small>",grammarLabel:"时态④：一般将来时 will",
coreWords:[["travel","旅行"],["plan","计划"],["tomorrow","明天"],["soon","很快"],["ticket","票"],["future","未来"],["hope","希望"],["decide","决定"],["pack","打包"],["weather","天气"]],
sentences:[
  {en:"I <b>will</b> <b>travel</b> to Shanghai next week. I <b>hope</b> the <b>weather</b> is nice.",cn:"我下周将去上海旅行。我希望天气好。"},
  {en:"She <b>will</b> not join us <b>tomorrow</b> because she has a meeting.",cn:"她明天不会加入我们，因为她有个会议。（will not = won't）"},
  {en:"<b>Will</b> you buy the <b>tickets</b> online? Yes, I <b>will</b>.",cn:"你会在网上买票吗？是的，我会。"},
  {en:"I think the <b>future</b> <b>will</b> be bright if we work hard.",cn:"我认为如果我们努力，未来会是光明的。"},
  {en:"I <b>have decided</b> — I <b>will</b> <b>pack</b> my bags tonight and leave <b>soon</b>.",cn:"我决定了——我今晚就打包行李，很快出发。"}
],
practice:[
  {prompt:"用 will + 动词原形完成句子:",template:"I ___ ___（travel）to Beijing next month.",words:["will","travel"]},
  {prompt:"用 will 的否定或疑问形式:",template:"___ you ___（come）to the party? No, she ___ not ___（go）. ",words:["Will","come","will","go"]}
],
express:{prompt:"用 will 说说你下周的计划（至少3个句子）:",words:["travel","tomorrow","hope","plan"]}
},

{title:"我打算学弹吉他",grammar:"be going to vs will<br><small>I am going to learn… / I will help you. / Look! It's going to rain!</small>",grammarLabel:"时态⑤：be going to vs will",
coreWords:[["guitar","吉他"],["learn","学习"],["intention","意图"],["promise","承诺"],["probably","大概"],["certainly","肯定"],["instrument","乐器"],["practice","练习"],["predict","预测"],["offer","提供"]],
sentences:[
  {en:"I am going to <b>learn</b> to play the <b>guitar</b>. It is my new year's <b>intention</b>.",cn:"我打算学弹吉他。这是我的新年打算。（打算→be going to）"},
  {en:"Look at those clouds! It is going to rain <b>probably</b> in a few minutes.",cn:"看那些云！大概几分钟内就要下雨了。（有迹象→be going to）"},
  {en:"I <b>promise</b> I <b>will</b> <b>practice</b> every day. I <b>will</b> not give up.",cn:"我承诺我会每天练习。我不会放弃。（承诺→will）"},
  {en:"She <b>will</b> <b>certainly</b> pass the exam — she has studied so hard.",cn:"她肯定会通过考试——她学得非常努力。（预测→will）"},
  {en:"A: The phone is ringing! B: I <b>will</b> answer it. (当场决定→will，非 be going to)",cn:"A：电话响了！B：我来接。（当场决定必须用 will）"}
],
practice:[
  {prompt:"选择 be going to 或 will:",template:"I ___ going to ___ the guitar. I ___ help you with your bag.",words:["am","learn","will"]},
  {prompt:"判断场景，选正确的将来表达:",template:"Look! The glass ___ going to fall! Don't worry, I ___ catch it.",words:["is","will"]}
],
express:{prompt:"用 be going to 和 will 各说两句，区分你的计划 vs 现场决定:",words:["guitar","learn","promise","practice"]}
},

{title:"明天这个时候我在干什么",grammar:"will be + V-ing<br><small>I will be studying… / She will be sleeping… / Will you be waiting…?</small>",grammarLabel:"时态⑥：将来进行时（Future Continuous）",
coreWords:[["exactly","恰好"],["flight","航班"],["attend","参加"],["exam","考试"],["busy","忙碌的"],["schedule","日程"],["activity","活动"],["prepare","准备"],["hour","小时"],["meeting","会议"]],
sentences:[
  {en:"At this time tomorrow, I <b>will</b> be flying on a <b>flight</b> to London.",cn:"明天这个时候，我将正在飞往伦敦的航班上。"},
  {en:"She <b>will</b> be <b>attending</b> an important <b>meeting</b> from 2 to 4 pm.",cn:"下午2点到4点，她将正在参加一个重要会议。"},
  {en:"Don't call me at 8 — I <b>will</b> be taking my English <b>exam</b>.",cn:"8点别给我打电话——我将正在考英语。"},
  {en:"This time next week, what <b>will</b> you be doing? I <b>will</b> be <b>preparing</b> for my trip.",cn:"下周此时你将在做什么？我将在为旅行做准备。"},
  {en:"My <b>schedule</b> is very <b>busy</b> — I <b>will</b> be working for eight <b>hours</b> straight.",cn:"我的日程很忙——我将连续工作八个小时。"}
],
practice:[
  {prompt:"用将来进行时 will be + V-ing 完成:",template:"At 3 pm tomorrow, I ___ ___ ___（study）in the library.",words:["will","be","studying"]},
  {prompt:"填入正确的将来进行时形式:",template:"This time next week, she ___ ___ ___（travel）to Paris.",words:["will","be","travelling"]}
],
express:{prompt:"用将来进行时描述明天下午3点你将在做什么（3句话）:",words:["exactly","busy","activity","prepare"]}
},

{title:"到年底我就学完这本书了",grammar:"will have + 过去分词<br><small>I will have finished… / By then, she will have left…</small>",grammarLabel:"时态⑦：将来完成时入门（Future Perfect）",
coreWords:[["finish","完成"],["complete","完成"],["graduate","毕业"],["achieve","实现"],["goal","目标"],["entire","整个的"],["progress","进步"],["project","项目"],["reach","达到"],["ahead","提前"]],
sentences:[
  {en:"By the end of this year, I <b>will</b> have <b>finished</b> this <b>entire</b> book.",cn:"到今年年底，我将学完这整本书。"},
  {en:"She <b>will</b> have <b>graduated</b> from university by next summer.",cn:"到明年夏天，她将已经大学毕业了。"},
  {en:"Don't worry — we <b>will</b> have <b>completed</b> the <b>project</b> before the deadline.",cn:"别担心——在截止日期前我们将已经完成这个项目。"},
  {en:"By 2030, I <b>will</b> have <b>achieved</b> my biggest <b>goal</b> in life.",cn:"到2030年，我将已经实现我人生中最大的目标。"},
  {en:"Keep working hard — you <b>will</b> have made great <b>progress</b> by the end of the term.",cn:"继续努力——到学期末你将已经取得很大进步。"}
],
practice:[
  {prompt:"用将来完成时 will have + 过去分词完成:",template:"By next month, I ___ ___ ___（finish）all my homework.",words:["will","have","finished"]},
  {prompt:"填入正确的形式:",template:"By 2027, she ___ ___ ___（graduate）from high school.",words:["will","have","graduated"]}
],
express:{prompt:"用将来完成时说说到今年年底你将已经完成的事情:",words:["finish","achieve","goal","progress"]}
},

{title:"我的生活时间线",grammar:"六大时态横向对比<br><small>I wake up… / I am reading… / I lived… / I have grown… / I will study… / I was sleeping…</small>",grammarLabel:"时态⑧：六大时态横向对比",
coreWords:[["timeline","时间线"],["born","出生"],["grow","成长"],["remember","记得"],["change","改变"],["dream","梦想"],["memory","记忆"],["future","未来"],["achievement","成就"],["journey","旅程"]],
sentences:[
  {en:"I <b>was</b> <b>born</b> in 2014. Now I am 12 years old. My <b>journey</b> has just begun.（一般过去→一般现在→现在完成）",cn:"我2014年出生。现在12岁。我的旅程才刚刚开始。"},
  {en:"I <b>am</b> <b>growing</b> taller every year. Last year, I was only 140 cm.（现在进行→一般过去）",cn:"我每年都在长高。去年我才140厘米。"},
  {en:"I <b>have</b> already <b>achieved</b> many things, and I <b>will</b> work even harder.（现在完成→一般将来）",cn:"我已经取得了很多成就，而且我会更加努力。"},
  {en:"When I <b>was</b> young, I <b>dreamed</b> of becoming a pilot. Now my <b>dream</b> has <b>changed</b>.",cn:"我小时候梦想成为飞行员。现在我的梦想改变了。"},
  {en:"I <b>will</b> always <b>remember</b> these happy <b>memories</b>. The <b>future</b> is bright.",cn:"我将永远记住这些快乐的回忆。未来是光明的。"}
],
practice:[
  {prompt:"判断时态并填入正确的动词形式:",template:"I ___（be）born in 2014. Now I ___（study）at middle school.",words:["was","study"]},
  {prompt:"用正确的时态完成时间线:",template:"Last year I ___（live）in Shanghai. Next year I ___（move）to Beijing.",words:["lived","will move"]}
],
express:{prompt:"画一条你的人生时间线，口头用至少4种时态介绍:",words:["born","grow","change","future"]}
},

{title:"你会弹钢琴吗",grammar:"can / could + be able to<br><small>I can play the piano. / Could you swim at age 5? / I am able to…</small>",grammarLabel:"情态动词①：能力 can/could/be able to",
coreWords:[["piano","钢琴"],["ability","能力"],["skill","技能"],["swim","游泳"],["draw","画画"],["manage","设法做到"],["talent","天赋"],["impossible","不可能的"],["ride","骑"],["dance","跳舞"]],
sentences:[
  {en:"<b>Can</b> you play the <b>piano</b>? Yes, I <b>can</b>. It is my favourite <b>skill</b>.",cn:"你会弹钢琴吗？是的，我会。这是我最喜欢的技能。"},
  {en:"When I was five, I <b>could</b> already <b>swim</b> very well.",cn:"我五岁时就已经能游得很好。（过去能力→could）"},

// ==================== RENDER ====================
var curTopic = 0;

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderTopicBar(){
  var h = '';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic-1+DATA.length)%DATA.length+')" title="上一课">←</button>';
  h += '<select onchange="pickTopic(parseInt(this.value))">';
  for(var i=0;i<DATA.length;i++){
    h += '<option value="'+i+'"'+(i===curTopic?' selected':'')+'>'+(i+1)+'. '+esc(DATA[i].title)+'</option>';
  }
  h += '</select>';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic+1)%DATA.length+')" title="下一课">→</button>';
  h += '<div class="progress" style="display:none"></div>';
  document.getElementById('topicBar').innerHTML = h;
}

function pickTopic(i){
  curTopic = i;
  renderTopicBar();
  renderTopic();
  window.scrollTo({top:0,behavior:'smooth'});
  if(window._testMode) startTest();
}

function renderTopic(){
  var t = DATA[curTopic];
  document.getElementById('topicTitle').textContent = (curTopic+1)+'. '+t.title;

  var h = '';

  // Section 1: Core Words
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🧠 核心词汇（10个）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">📖 '+t.grammarLabel+'</div>';
  h += '<div class="word-grid">';
  t.coreWords.forEach(function(w){
    h += '<div class="word-chip"><button class="spk" data-w="'+esc(w[0])+'">🔊</button><span class="en">'+esc(w[0])+'</span><span class="cn">'+esc(w[1])+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 2: Grammar Sentences
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>📝 语法例句（5句）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">'+t.grammar+'</div><div class="sentence-list">';
  t.sentences.forEach(function(s){
    h += '<div class="sent">'+s.en+'<span class="cn">'+esc(s.cn)+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 3: Sentence Practice
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>✏️ 造句练习</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd">';
  t.practice.forEach(function(p,pIdx){
    h += '<div class="practice-item" id="practice-'+pIdx+'">';
    h += '<div class="prompt">'+esc(p.prompt)+'</div>';
    var parts = p.template.split('___');
    var blanks = '<span class="blanks">';
    for(var pi=0; pi<parts.length; pi++){
      blanks += esc(parts[pi]);
      if(pi < parts.length-1){
        blanks += '<span class="gap" id="gap-'+pIdx+'-'+pi+'" onclick="fillGap('+pIdx+','+pi+')">______</span>';
      }
    }
    blanks += '</span>';
    h += blanks;
    h += '<div class="choices" id="choices-'+pIdx+'">';
    p.words.forEach(function(w){
      h += '<button id="btn-'+pIdx+'-'+esc(w)+'" onclick="pickWord('+pIdx+',\''+esc(w)+'\')">'+esc(w)+'</button>';
    });
    h += '</div></div>';
  });
  h += '</div></div>';

  // Section 4: Expression Challenge
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🗣️ 表达挑战</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="express-box">';
  h += '<div class="prompt">'+esc(t.express.prompt)+'</div>';
  h += '<div class="words-hint">可用词汇：<b>'+t.express.words.map(esc).join(' &nbsp;·&nbsp; ')+'</b></div>';
  h += '</div></div></div>';

  // Section 5: Flashcard Test
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🎯 闪卡测试（10词）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div id="testArea"><button onclick="startTest()" style="padding:10px 24px;border-radius:20px;border:none;background:#1a6b5a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">开始测试</button></div></div></div>';

  document.getElementById('main').innerHTML = h;

  // Rebind speak buttons
  document.querySelectorAll('.spk').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var w = this.getAttribute('data-w');
      if(!w||!window.speechSynthesis)return;
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
      speechSynthesis.speak(u);
    });
  });
}

// ==================== SENTENCE PRACTICE ====================
function fillGap(pIdx,gIdx){
  var gap = document.getElementById('gap-'+pIdx+'-'+gIdx);
  if(!gap||gap.classList.contains('filled'))return;
}

function pickWord(pIdx,word){
  var key = pIdx+'-'+word;
  var btn = document.getElementById('btn-'+key);
  if(!btn||btn.classList.contains('used'))return;

  var gaps = document.querySelectorAll('[id^="gap-'+pIdx+'-"]');
  for(var g=0;g<gaps.length;g++){
    if(!gaps[g].classList.contains('filled')){
      gaps[g].textContent = word;
      gaps[g].classList.add('filled');
      btn.classList.add('used');
      break;
    }
  }

  var allFilled = true;
  for(var g2=0;g2<gaps.length;g2++){
    if(!gaps[g2].classList.contains('filled')){allFilled=false;break;}
  }
  if(allFilled){
    var practiceBox = document.getElementById('practice-'+pIdx);
    if(practiceBox) practiceBox.style.borderColor = '#16a34a';
  }
}

// ==================== FLASHCARD TEST ====================
window._testMode = false;
var tw=[],ti=0,tok=0,tfail=0,shown=false;

function startTest(){
  window._testMode = true;
  tw = DATA[curTopic].coreWords.slice();
  tw.sort(function(){return Math.random()-0.5});
  ti=0;tok=0;tfail=0;shown=false;
  updateTestStats();
  showCard();
}

function updateTestStats(){
  var done = tok+tfail, rem = tw.length-ti;
  var total = tok+tfail+rem;
  var h = '<div class="test-stats">';
  h += '<div class="st"><div class="n">'+rem+'</div><div class="l">剩余</div></div>';
  h += '<div class="st"><div class="n" style="color:#16a34a">'+tok+'</div><div class="l">✓</div></div>';
  h += '<div class="st"><div class="n" style="color:#dc2626">'+tfail+'</div><div class="l">✗</div></div>';
  h += '<div class="st"><div class="n">'+(done?Math.round(done/total*100):0)+'%</div><div class="l">进度</div></div>';
  h += '</div><div id="cardArea"></div><div class="test-btns" id="testBtns"></div>';
  document.getElementById('testArea').innerHTML = h;
}

function showCard(){
  if(ti>=tw.length){
    var rate = (tok+tfail)?Math.round(tok/(tok+tfail)*100):0;
    document.getElementById('cardArea').innerHTML = '<div class="stats-done"><div class="emoji">'+(rate>=80?'🎉':rate>=50?'💪':'📖')+'</div><h3>完成！</h3><div class="rate" style="color:'+(rate>=60?'#16a34a':'#dc2626')+'">'+rate+'%</div><p style="color:#888">正确 '+tok+' / 错误 '+tfail+'</p><button onclick="startTest()" style="margin-top:8px;padding:8px 24px;border-radius:16px;border:none;background:#1a6b5a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit">🔄 再来一轮</button></div>';
    document.getElementById('testBtns').innerHTML = '';
    return;
  }
  var w = tw[ti];shown=false;
  document.getElementById('cardArea').innerHTML = '<div class="fc" id="fc" onclick="reveal()"><button class="fc-spk" data-w="'+esc(w[0])+'" onclick="event.stopPropagation();speakWord(\''+esc(w[0])+'\')">🔊</button><div class="ew">'+esc(w[0])+'</div><div class="cn-hidden" id="cnHidden">'+esc(w[1])+'</div><div class="tap">👆 点击查看中文</div></div>';
  document.getElementById('testBtns').innerHTML = '<button class="btn-no" onclick="mark(false)">不认识</button><button class="btn-yes" onclick="mark(true)">认识</button>';
}

function reveal(){
  if(shown)return;shown=true;
  var cn = document.getElementById('cnHidden');
  if(cn)cn.style.display='block';
  var fc = document.getElementById('fc');
  if(fc)fc.classList.add('reveal');
}

function mark(ok){
  if(!shown){reveal();return;}
  if(ok)tok++;else tfail++;
  ti++;
  updateTestStats();
  showCard();
}

function speakWord(w){
  if(!w||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
  speechSynthesis.speak(u);
}

// ==================== INIT ====================
renderTopicBar();
renderTopic();
</script>
