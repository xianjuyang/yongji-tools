<script>
// ==================== STAGE 1 DATA (V3 — 语法更新) ====================
var DATA = [
{title:"比一比谁更高",grammar:"形容词比较级/最高级<br><small>-er than / more…than / the -est / the most…</small>",grammarLabel:"形容词①：比较级与最高级",
coreWords:[["tall","高的"],["short","矮的"],["big","大的"],["small","小的"],["fast","快的"],["slow","慢的"],["easy","容易的"],["hard","困难的"],["cheap","便宜的"],["expensive","昂贵的"]],
sentences:[
  {en:"Tom is <b>taller</b> than Jack, but Jack is <b>shorter</b>.",cn:"Tom 比 Jack 高，但 Jack 更矮。（-er than 比较级）"},
  {en:"This car is <b>faster</b> than that one, and it is the <b>fastest</b>.",cn:"这辆车比那辆快，而且它是最快的。（最快用 the -est）"},
  {en:"My bag is <b>bigger</b> than yours, but hers is the <b>biggest</b>.",cn:"我的书包比你的大，但她的是最大的。（双写 g + er/est）"},
  {en:"This problem is more <b>difficult</b> than that one. It is the most <b>difficult</b>.",cn:"这个问题比那个更难。它是最难的。（多音节用 more/most）"},
  {en:"The phone is more <b>expensive</b> than the watch, but the watch is <b>cheaper</b>.",cn:"手机比手表更贵，但手表更便宜。（cheap 直接加 -er）"}
],
practice:[
  {prompt:"用比较级填入（-er than 或 more...than）:",template:"Tom is ___ than Jack. This book is more ___ than that one.",words:["taller","difficult"]},
  {prompt:"用最高级填入（the -est 或 the most...）:",template:"She is the ___ girl in class. It is the most ___ question.",words:["tallest","expensive"]}
],
express:{prompt:"用比较级比较两个同学：更高/更矮/更快/更聪明（口头 3 句话）:",words:["tall","short","fast","hard"]}
},

{title:"班里最有趣的人",grammar:"不规则比较级/最高级<br><small>good-better-best / bad-worse-worst / many-more-most</small>",grammarLabel:"形容词②：不规则比较级与最高级",
coreWords:[["good","好的"],["better","更好的"],["best","最好的"],["bad","坏的"],["worse","更坏的"],["worst","最坏的"],["interesting","有趣的"],["boring","无聊的"],["popular","受欢迎的"],["friendly","友好的"]],
sentences:[
  {en:"This book is <b>good</b>, but that one is <b>better</b>. This is the <b>best</b>.",cn:"这本书好，但那本更好。这本是最好的。（good→better→best）"},
  {en:"The weather today is <b>bad</b>, yesterday was <b>worse</b>, and Monday was the <b>worst</b>.",cn:"今天天气差，昨天更差，周一最差。（bad→worse→worst）"},
  {en:"She is the most <b>interesting</b> person in our class. She has more friends.",cn:"她是我们班最有趣的人。她有更多朋友。（规则比较级对比）"},
  {en:"This movie is more <b>boring</b> than that one. It is the <b>worst</b> film I've seen.",cn:"这部电影比那部更无聊。这是我看过的最差的电影。（混合练习）"},
  {en:"He is more <b>popular</b> than me, but I am <b>friendlier</b> than him.",cn:"他比我更受欢迎，但我比他更友好。（-ier 变法）"}
],
practice:[
  {prompt:"填入不规则比较级/最高级:",template:"good → ___ → ___ | bad → ___ → ___",words:["better","best","worse","worst"]},
  {prompt:"完成句子:",template:"She is the ___ student. He is ___ than his brother.",words:["best","better"]}
],
express:{prompt:"用不规则比较级描述班里的同学（好/坏/有趣）：",words:["good","better","best","interesting"]}
},

{title:"那部电影真令人兴奋",grammar:"-ing vs -ed 形容词<br><small>exciting/excited / boring/bored / interesting/interested</small>",grammarLabel:"形容词③：-ing 与 -ed 形容词",
coreWords:[["exciting","令人兴奋的"],["excited","感到兴奋的"],["boring","令人无聊的"],["bored","感到无聊的"],["interesting","令人感兴趣的"],["interested","感兴趣的"],["surprising","令人惊讶的"],["surprised","感到惊讶的"],["tiring","令人疲倦的"],["tired","感到疲倦的"]],
sentences:[
  {en:"The film was very <b>exciting</b>. I felt very <b>excited</b> after watching it.",cn:"那部电影非常令人兴奋。看完后我感到很兴奋。（-ing 描述事物 / -ed 描述感受）"},
  {en:"The lesson was <b>boring</b>, so all the students felt <b>bored</b>.",cn:"那堂课很无聊，所以所有学生都感到无聊。（-ing 指课程 / -ed 指感受）"},
  {en:"This book is really <b>interesting</b>. I am <b>interested</b> in science.",cn:"这本书真的很有趣。我对科学感兴趣。（interested in + 名词）"},
  {en:"The news was <b>surprising</b>. Everyone looked <b>surprised</b>.",cn:"那个消息令人惊讶。每个人看起来都很惊讶。"},
  {en:"The long walk was <b>tiring</b>. I feel very <b>tired</b> now.",cn:"长途步行很累人。我现在感到很疲倦。"}
],
practice:[
  {prompt:"选择 -ing 或 -ed 填入:",template:"The game is ___. I feel ___.",words:["exciting","excited"]},
  {prompt:"选择正确的形容词形式:",template:"The book is ___. I am ___ in it.",words:["interesting","interested"]}
],
express:{prompt:"用 -ing/-ed 形容词描述一部电影或一本书的感受：",words:["exciting","excited","boring","interesting"]}
},

{title:"他总是来得很早",grammar:"频率副词 + 程度副词<br><small>always/usually/often/sometimes/never + very/quite/too/really</small>",grammarLabel:"副词①：频率副词与程度副词",
coreWords:[["always","总是"],["usually","通常"],["often","经常"],["sometimes","有时"],["never","从不"],["early","早地"],["late","晚地"],["quickly","快速地"],["carefully","小心地"],["really","真正地"]],
sentences:[
  {en:"He <b>always</b> comes to school <b>early</b>. She is <b>never</b> <b>late</b>.",cn:"他总是很早来学校。她从不迟到。（频率副词 + 时间副词）"},
  {en:"I <b>usually</b> do my homework <b>carefully</b>. It is <b>really</b> important.",cn:"我通常小心地做作业。这真的很重要。（usually + carefully / really）"},
  {en:"She <b>often</b> reads books <b>quickly</b>. She is a fast reader.",cn:"她经常快速读书。她是个快速阅读者。（often + 方式副词）"},
  {en:"We <b>sometimes</b> go to the park. It is <b>quite</b> far from here.",cn:"我们有时去公园。离这里相当远。（sometimes + quite）"},
  {en:"I have <b>never</b> been to Beijing. It is <b>too</b> far away.",cn:"我从未去过北京。太远了。（never + too）"}
],
practice:[
  {prompt:"用频率副词填入:",template:"He ___ comes early. She ___ forgets her bag.",words:["always","never"]},
  {prompt:"用方式副词填入:",template:"She walks ___. Please listen ___.",words:["quickly","carefully"]}
],
express:{prompt:"用 always/usually/sometimes/never 描述你的日常习惯（4 句话）:",words:["always","usually","sometimes","never"]}
},

{title:"你跑得有多快",grammar:"方式副词（-ly）+ 副词比较级<br><small>slowly/quickly/carefully → more quickly / faster</small>",grammarLabel:"副词②：方式副词与副词比较级",
coreWords:[["slowly","慢慢地"],["quickly","快速地"],["carefully","小心地"],["loudly","大声地"],["quietly","安静地"],["easily","容易地"],["happily","快乐地"],["sadly","悲伤地"],["angrily","生气地"],["politely","礼貌地"]],
sentences:[
  {en:"He runs very <b>quickly</b>. She walks more <b>slowly</b> than him.",cn:"他跑得非常快。她走得比他更慢。（quickly vs more slowly）"},
  {en:"Please speak <b>quietly</b>. The baby is sleeping <b>peacefully</b>.",cn:"请安静地讲话。宝宝在安静地睡觉。"},
  {en:"She answered the question <b>easily</b>. He finished more <b>quickly</b> than her.",cn:"她轻松地回答了问题。他比她更快完成。（副词比较级）"},
  {en:"He shouted <b>loudly</b> and then spoke <b>politely</b> to the teacher.",cn:"他大声喊叫，然后礼貌地对老师说话。（不同方式副词对比）"},
  {en:"She smiled <b>happily</b>, but he walked away <b>sadly</b> and <b>angrily</b>.",cn:"她快乐地微笑，但他悲伤又生气地走开了。（y → ily）"}
],
practice:[
  {prompt:"把形容词变成副词填入:",template:"happy → ___ | slow → ___ | angry → ___",words:["happily","slowly","angrily"]},
  {prompt:"用副词比较级完成:",template:"She runs ___ than me. He speaks more ___ than his brother.",words:["faster","politely"]}
],
express:{prompt:"用至少 3 个 -ly 副词描述你如何做一件事（口头 3 句话）:",words:["slowly","carefully","happily","quietly"]}
},

{title:"我的房间在哪里",grammar:"方位介词<br><small>in/on/under/behind/between/next to/opposite/in front of</small>",grammarLabel:"介词①：方位介词",
coreWords:[["behind","在…后面"],["between","在…之间"],["opposite","在…对面"],["above","在…上方"],["below","在…下方"],["near","在…附近"],["inside","在…里面"],["outside","在…外面"],["corner","角落"],["middle","中间"]],
sentences:[
  {en:"My room is <b>behind</b> the kitchen, <b>between</b> the bathroom and the study.",cn:"我的房间在厨房后面，在浴室和书房之间。（behind + between）"},
  {en:"The park is <b>opposite</b> the school, <b>near</b> the supermarket.",cn:"公园在学校对面，在超市附近。（opposite + near）"},
  {en:"The cat is <b>inside</b> the box. The dog is <b>outside</b> the house.",cn:"猫在盒子里面。狗在房子外面。（inside vs outside）"},
  {en:"The lamp is <b>above</b> the desk. The shoes are <b>below</b> the bed.",cn:"灯在书桌上方。鞋子在床下面。（above vs below）"},
  {en:"Put the table in the <b>middle</b> of the room, next to the <b>corner</b> shelf.",cn:"把桌子放在房间中间，挨着角落的架子。（middle + corner）"}
],
practice:[
  {prompt:"用方位介词填入:",template:"The book is ___ the desk. The cat is ___ the chair.",words:["on","under"]},
  {prompt:"选择正确的介词:",template:"The school is ___（在…对面）the park. The bag is ___（在…之间）the desk and the bed.",words:["opposite","between"]}
],
express:{prompt:"用 4 个方位介词描述你的房间布局（口头 3 句话）:",words:["behind","between","near","opposite"]}
},

{title:"你什么时候起床",grammar:"时间介词<br><small>at/on/in/from…to/since/for/during/before/after</small>",grammarLabel:"介词②：时间介词",
coreWords:[["morning","早晨"],["afternoon","下午"],["evening","晚上"],["night","夜晚"],["weekend","周末"],["holiday","假日"],["minute","分钟"],["hour","小时"],["month","月份"],["year","年份"]],
sentences:[
  {en:"I get up <b>at</b> 7 o'clock <b>in</b> the <b>morning</b>.",cn:"我早上 7 点起床。（at + 时刻 / in + 时间段）"},
  {en:"She was born <b>in</b> July, <b>on</b> a sunny Monday.",cn:"她出生在七月，一个晴朗的星期一。（in + 月 / on + 具体某天）"},
  {en:"I study <b>from</b> 8 a.m. <b>to</b> 3 p.m. every day.",cn:"我每天从早上 8 点学习到下午 3 点。（from…to 时间段）"},
  {en:"He has lived here <b>since</b> 2020, <b>for</b> five <b>years</b>.",cn:"他从 2020 年起住在这里，住了五年了。（since + 起点 / for + 时长）"},
  {en:"<b>During</b> the <b>holiday</b>, I wake up <b>after</b> 9 o'clock. <b>Before</b> that, I sleep.",cn:"假期期间，我 9 点以后起床。在那之前，我睡觉。（during + after + before）"}
],
practice:[
  {prompt:"用 at / on / in 填入:",template:"I get up ___ 7:30 ___ the morning. She was born ___ Monday.",words:["at","in","on"]},
  {prompt:"用 from…to / since / for 填入:",template:"I work ___ 9 a.m. ___ 5 p.m. He has waited ___ two hours.",words:["from","to","for"]}
],
express:{prompt:"用 at/in/on/from…to 描述你每天的作息时间（口头 4 句话）:",words:["morning","afternoon","evening","weekend"]}
},

{title:"我喜欢苹果和橙子",grammar:"并列连词<br><small>and/but/or/so/for/nor/yet</small>",grammarLabel:"连词①：并列连词",
coreWords:[["apple","苹果"],["orange","橙子"],["banana","香蕉"],["grape","葡萄"],["market","市场"],["shop","商店"],["choose","选择"],["decide","决定"],["taste","尝起来"],["fresh","新鲜的"]],
sentences:[
  {en:"I like <b>apples</b> <b>and</b> <b>oranges</b>, <b>but</b> I don't like <b>bananas</b>.",cn:"我喜欢苹果和橙子，但我不喜欢香蕉。（and 并列 / but 转折）"},
  {en:"Do you want <b>grapes</b> <b>or</b> strawberries? You must <b>choose</b> one.",cn:"你想要葡萄还是草莓？你必须选一个。（or 选择）"},

// ==================== RENDER ====================
var curTopic = 0;

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderTopicBar(){
  var h = '';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic-1+DATA.length)%DATA.length+')" title="上一课">←</button>';
  h += '<select onchange="pickTopic(parseInt(this.value))">';
  for(var i=0;i<DATA.length;i++){
    h += '<option value="'+i+'"'+(i===curTopic?' selected':'')+'>'+(i+16)+'. '+esc(DATA[i].title)+'</option>';
  }
  h += '</select>';
  h += '<button class="nav-btn" onclick="pickTopic('+(curTopic+1)%DATA.length+')" title="下一课">→</button>';
  h += '<div class="progress" style="display:none"></div>';
  document.getElementById('topicBar').innerHTML = h;
}

function pickTopic(i){
  curTopic = i;
  renderTopicBar();
  renderTopic();
  window.scrollTo({top:0,behavior:'smooth'});
  if(window._testMode) startTest();
}

function renderTopic(){
  var t = DATA[curTopic];
  document.getElementById('topicTitle').textContent = (curTopic+16)+'. '+t.title;

  var h = '';

  // Section 1: Core Words
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🧠 核心词汇（10个）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">📖 '+t.grammarLabel+'</div>';
  h += '<div class="word-grid">';
  t.coreWords.forEach(function(w){
    h += '<div class="word-chip"><button class="spk" data-w="'+esc(w[0])+'">🔊</button><span class="en">'+esc(w[0])+'</span><span class="cn">'+esc(w[1])+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 2: Grammar Sentences
  h += '<div class="sec open">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>📝 语法例句（5句）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="grammar-label">'+t.grammar+'</div><div class="sentence-list">';
  t.sentences.forEach(function(s){
    h += '<div class="sent">'+s.en+'<span class="cn">'+esc(s.cn)+'</span></div>';
  });
  h += '</div></div></div>';

  // Section 3: Sentence Practice
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>✏️ 造句练习</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd">';
  t.practice.forEach(function(p,pIdx){
    h += '<div class="practice-item" id="practice-'+pIdx+'">';
    h += '<div class="prompt">'+esc(p.prompt)+'</div>';
    var parts = p.template.split('___');
    var blanks = '<span class="blanks">';
    for(var pi=0; pi<parts.length; pi++){
      blanks += esc(parts[pi]);
      if(pi < parts.length-1){
        blanks += '<span class="gap" id="gap-'+pIdx+'-'+pi+'" onclick="fillGap('+pIdx+','+pi+')">______</span>';
      }
    }
    blanks += '</span>';
    h += blanks;
    h += '<div class="choices" id="choices-'+pIdx+'">';
    p.words.forEach(function(w){
      h += '<button id="btn-'+pIdx+'-'+esc(w)+'" onclick="pickWord('+pIdx+',\''+esc(w)+'\')">'+esc(w)+'</button>';
    });
    h += '</div></div>';
  });
  h += '</div></div>';

  // Section 4: Expression Challenge
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🗣️ 表达挑战</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div class="express-box">';
  h += '<div class="prompt">'+esc(t.express.prompt)+'</div>';
  h += '<div class="words-hint">可用词汇：<b>'+t.express.words.map(esc).join(' &nbsp;·&nbsp; ')+'</b></div>';
  h += '</div></div></div>';

  // Section 5: Flashcard Test
  h += '<div class="sec">';
  h += '<div class="hd" onclick="this.parentElement.classList.toggle(\'open\')"><h3>🎯 闪卡测试（10词）</h3><span class="arrow">▼</span></div>';
  h += '<div class="bd"><div id="testArea"><button onclick="startTest()" style="padding:10px 24px;border-radius:20px;border:none;background:#1a6b5a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">开始测试</button></div></div></div>';

  document.getElementById('main').innerHTML = h;

  // Rebind speak buttons
  document.querySelectorAll('.spk').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      var w = this.getAttribute('data-w');
      if(!w||!window.speechSynthesis)return;
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
      speechSynthesis.speak(u);
    });
  });
}

// ==================== SENTENCE PRACTICE ====================
function fillGap(pIdx,gIdx){
  var gap = document.getElementById('gap-'+pIdx+'-'+gIdx);
  if(!gap||gap.classList.contains('filled'))return;
}

function pickWord(pIdx,word){
  var key = pIdx+'-'+word;
  var btn = document.getElementById('btn-'+key);
  if(!btn||btn.classList.contains('used'))return;

  var gaps = document.querySelectorAll('[id^="gap-'+pIdx+'-"]');
  for(var g=0;g<gaps.length;g++){
    if(!gaps[g].classList.contains('filled')){
      gaps[g].textContent = word;
      gaps[g].classList.add('filled');
      btn.classList.add('used');
      break;
    }
  }

  var allFilled = true;
  for(var g2=0;g2<gaps.length;g2++){
    if(!gaps[g2].classList.contains('filled')){allFilled=false;break;}
  }
  if(allFilled){
    var practiceBox = document.getElementById('practice-'+pIdx);
    if(practiceBox) practiceBox.style.borderColor = '#16a34a';
  }
}

// ==================== FLASHCARD TEST ====================
window._testMode = false;
var tw=[],ti=0,tok=0,tfail=0,shown=false;

function startTest(){
  window._testMode = true;
  tw = DATA[curTopic].coreWords.slice();
  tw.sort(function(){return Math.random()-0.5});
  ti=0;tok=0;tfail=0;shown=false;
  updateTestStats();
  showCard();
}

function updateTestStats(){
  var done = tok+tfail, rem = tw.length-ti;
  var total = tok+tfail+rem;
  var h = '<div class="test-stats">';
  h += '<div class="st"><div class="n">'+rem+'</div><div class="l">剩余</div></div>';
  h += '<div class="st"><div class="n" style="color:#16a34a">'+tok+'</div><div class="l">✓</div></div>';
  h += '<div class="st"><div class="n" style="color:#dc2626">'+tfail+'</div><div class="l">✗</div></div>';
  h += '<div class="st"><div class="n">'+(done?Math.round(done/total*100):0)+'%</div><div class="l">进度</div></div>';
  h += '</div><div id="cardArea"></div><div class="test-btns" id="testBtns"></div>';
  document.getElementById('testArea').innerHTML = h;
}

function showCard(){
  if(ti>=tw.length){
    var rate = (tok+tfail)?Math.round(tok/(tok+tfail)*100):0;
    document.getElementById('cardArea').innerHTML = '<div class="stats-done"><div class="emoji">'+(rate>=80?'🎉':rate>=50?'💪':'📖')+'</div><h3>完成！</h3><div class="rate" style="color:'+(rate>=60?'#16a34a':'#dc2626')+'">'+rate+'%</div><p style="color:#888">正确 '+tok+' / 错误 '+tfail+'</p><button onclick="startTest()" style="margin-top:8px;padding:8px 24px;border-radius:16px;border:none;background:#1a6b5a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit">🔄 再来一轮</button></div>';
    document.getElementById('testBtns').innerHTML = '';
    return;
  }
  var w = tw[ti];shown=false;
  document.getElementById('cardArea').innerHTML = '<div class="fc" id="fc" onclick="reveal()"><button class="fc-spk" data-w="'+esc(w[0])+'" onclick="event.stopPropagation();speakWord(\''+esc(w[0])+'\')">🔊</button><div class="ew">'+esc(w[0])+'</div><div class="cn-hidden" id="cnHidden">'+esc(w[1])+'</div><div class="tap">👆 点击查看中文</div></div>';
  document.getElementById('testBtns').innerHTML = '<button class="btn-no" onclick="mark(false)">不认识</button><button class="btn-yes" onclick="mark(true)">认识</button>';
}

function reveal(){
  if(shown)return;shown=true;
  var cn = document.getElementById('cnHidden');
  if(cn)cn.style.display='block';
  var fc = document.getElementById('fc');
  if(fc)fc.classList.add('reveal');
}

function mark(ok){
  if(!shown){reveal();return;}
  if(ok)tok++;else tfail++;
  ti++;
  updateTestStats();
  showCard();
}

function speakWord(w){
  if(!w||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
  speechSynthesis.speak(u);
}

// ==================== INIT ====================
renderTopicBar();
renderTopic();
</script>
