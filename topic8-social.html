var S=[{title:"打招呼寒暄",sub:"Greetings",words:[["pleased to meet you","很高兴认识你"],["How are you","你好吗"],["introduce","介绍"],["colleague","同事"],["handshake","握手"],["small talk","寒暄"],["break the ice","打破沉默"],["weather","天气"],["What do you do","你做什么工作"],["keep in touch","保持联系"],["stranger","陌生人"],["formal","正式"],["informal","非正式"],["It has been a while","好久不见"],["networking","社交网络"],["acquaintance","熟人"]],
conv:[["r","Hello! I do not think we have met. I am Chen Wei — <b class=kw>pleased to meet you</b>.","你好！我们好像没见过。我是陈伟——很高兴认识你。"],

["s","Welcome to England! There is a saying — there is no bad <b class=kw>weather</b>, only unsuitable clothing. <b class=kw>What do you do</b> back in China?","欢迎来到英格兰！有句老话——没有坏天气，只有不合适的衣服。你在中国做什么工作？"],
["u","I work for an educational publisher. I develop bilingual textbooks. It is very rewarding work. What about you?","我在一家教育出版社工作。开发双语教材。很有成就感的工作。你呢？"],
["s","I am in marketing. Let me <b class=kw>introduce</b> you to my <b class=kw>colleague</b> James — he works in publishing too. And let us <b class=kw>keep in touch</b> after this event!","我做市场营销。我介绍你认识我同事James——他也做出版。这次活动后我们保持联系！"]]},
{title:"自我介绍",sub:"Self-intro",words:[["self-introduction","自我介绍"],["background","背景"],["graduated from","毕业于"],["work for","为…工作"],["specialize in","专攻"],["passionate about","热衷于"],["fluent in","流利"],["currently","目前"],["look forward to","期待"],["opportunity","机会"],["profession","职业"],["hometown","家乡"],["major","专业"],["in my free time","业余时间"],["move abroad","移居海外"],["overseas experience","海外经历"]],
conv:[["r","Let me <b class=kw>introduce</b> myself properly. I am Chen Wei, from Shanghai. I <b class=kw>graduated from</b> Fudan University.","让我正式介绍一下。我是陈伟，来自上海。毕业于复旦大学。"],
["s","Fudan — very impressive! And what do you do <b class=kw>currently</b>? What do you <b class=kw>specialize in</b>?","复旦——很厉害！你目前做什么工作？专攻什么领域？"],
["u","I <b class=kw>work for</b> an educational publisher. I <b class=kw>specialize in</b> bilingual textbooks. I am <b class=kw>passionate about</b> making English learning more accessible.","我在教育出版社工作。专攻双语教材。我热衷于让英语学习更容易触达。"],
["s","That sounds incredibly meaningful! And what do you enjoy doing <b class=kw>in my free time</b>? Any hobbies?","听起来非常有意义！业余时间喜欢做什么？有什么爱好？"],
["u","I love photography and hiking. I am also <b class=kw>fluent in</b> English and Japanese, and <b class=kw>currently</b> learning Spanish. I <b class=kw>look forward to</b> more <b class=kw>overseas experience</b>.","我爱摄影和徒步。还流利掌握英语和日语，目前学西班牙语。期待更多海外经历。"],
["s","Three languages — amazing! I think you will fit right in here. Let me introduce you to the team.","三门语言——太厉害了！我觉得你会很适合这里。来介绍你认识团队。"]]},
{title:"文化习俗",sub:"Customs",words:[["custom","习俗"],["polite","礼貌"],["rude","粗鲁"],["host gift","伴手礼"],["punctual","准时"],["queue","排队"],["eye contact","眼神交流"],["table manners","餐桌礼仪"],["RSVP","请回复"],["appropriate","合适"],["tradition","传统"],["tip","小费"],["personal space","私人空间"],["toast","敬酒"],["taking off shoes","脱鞋"],["bless you","祝你健康"]],
conv:[["r","Before the dinner tonight, I have a few questions about local <b class=kw>custom</b>s. Is it <b class=kw>polite</b> to bring a <b class=kw>host gift</b>?","今晚晚餐前，关于本地习俗有几个问题。带伴手礼礼貌吗？"],
["s","Yes, flowers or a bottle of wine are always <b class=kw>appropriate</b>. Being <b class=kw>punctual</b> is very important — do not be more than 10 minutes late.","是的，鲜花或红酒永远合适。准时很重要——迟到别超过10分钟。"],
["u","Good to know! How much should I <b class=kw>tip</b> at a restaurant? And is it <b class=kw>rude</b> not to finish everything on my plate?","了解了！餐厅该给多少小费？不吃完盘里的算粗鲁吗？"],
["s","<b class=kw>Tip</b> 10 to 15 percent for good service. It is not <b class=kw>rude</b> to leave a little food, but do not waste a lot. Also, <b class=kw>queue</b> jumping is considered extremely <b class=kw>rude</b> here!","好服务小费10%到15%。剩一点不算粗鲁，但别浪费太多。还有，在这儿插队被认为非常粗鲁！"],
["u","I noticed people <b class=kw>queue</b> very patiently here! What about <b class=kw>eye contact</b> — is it considered <b class=kw>polite</b> or aggressive?","我注意到人们排队很有耐心！眼神交流呢——算礼貌还是冒犯？"],
["s","<b class=kw>Eye contact</b> shows you are engaged — it is <b class=kw>polite</b>. Just do not stare for too long! And remember to <b class=kw>RSVP</b> to invitations promptly.","眼神交流表示你在认真听——算礼貌。只是别盯太久！还有收到邀请请回复。"]]},
{title:"交友邀约",sub:"Friends",words:[["hang out","一起玩"],["grab a coffee","喝杯咖啡"],["invitation","邀请"],["accept","接受"],["decline","婉拒"],["rain check","改天"],["get together","聚一聚"],["how about","怎么样"],["sounds great","听起来很棒"],["count me in","算我一个"],["available","有空"],["busy","忙碌"],["free of charge","免费"],["social media","社交媒体"],["weekend","周末"],["maybe another time","下次吧"]],
conv:[["r","Hey, a few of us are going to <b class=kw>grab a coffee</b> after work. Would you like to join us?","嘿，我们几个下班后去喝咖啡。你要一起吗？"],
["s","I would love to! <b class=kw>Count me in</b>. Are you <b class=kw>available</b> on the <b class=kw>weekend</b> too?","我很愿意！算我一个。你周末也有空吗？"],
["u","This weekend I am a bit <b class=kw>busy</b>, actually. <b class=kw>Rain check</b> for next weekend? I would love to <b class=kw>hang out</b>.","这周末其实有点忙。改天下周末？我很想一起玩。"],
["s","Sure! <b class=kw>How about</b> a <b class=kw>get together</b> at my place next Saturday? Just a casual dinner — <b class=kw>free of charge</b> of course!","当然！下周六在我家聚一聚怎么样？就随便吃个饭——当然免费！"],
["u","That <b class=kw>sounds great</b>! Let me check with my wife and I will <b class=kw>accept</b> the <b class=kw>invitation</b> tomorrow.","听起来很棒！我跟太太确认一下，明天接受邀请。"],
["s","Perfect! Here is my <b class=kw>social media</b> — add me and I will send you the address. <b class=kw>Maybe another time</b> if this weekend does not work.","完美！这是我社交媒体——加我发地址给你。如果这周末不行就下次。"]]},
{title:"感谢与致歉",sub:"Gratitude",words:[["thank you so much","非常感谢"],["I really appreciate it","真的很感激"],["my pleasure","我的荣幸"],["I am so sorry","非常抱歉"],["it was my fault","是我的错"],["no worries","别担心"],["make it up to you","补偿你"],["I owe you one","我欠你一次"],["don't mention it","别客气"],["forgive me","原谅我"],["you are welcome","不客气"],["no problem","没问题"],["apologize","道歉"],["excuse me","打扰一下"],["not at all","一点也不"],["I did not mean to","我不是故意的"]],
conv:[["r","<b class=kw>Thank you so much</b> for all your help this week — <b class=kw>I really appreciate it</b>. I would have been lost without you.","非常感谢你这周的帮助——真的很感激。没有你我完全不知道怎么办。"],
["s","<b class=kw>My pleasure</b>! You were great company. Oh, and <b class=kw>I am so sorry</b> I forgot to return your book — I left it at home.","我的荣幸！你是个好伙伴。哦，非常抱歉忘了还你的书——落在家了。"],
["u","<b class=kw>No worries</b> at all! Actually, I need to <b class=kw>apologize</b> too — I was late to the meeting yesterday. <b class=kw>It was my fault</b> entirely.","完全没关系！其实我也需要道歉——昨天开会迟到了。完全是我的错。"],
["s","<b class=kw>Not at all</b> — the traffic was terrible that day. <b class=kw>No problem</b> at all.","一点也不——那天交通太糟糕了。完全没问题。"],
["u","You are very kind. Let me <b class=kw>make it up to you</b> — lunch is on me today. I insist!","你真好。让我补偿你——今天午饭我请。坚持请！"],
["s","You really do not have to! But I will accept. <b class=kw>I owe you one</b> for next time. <b class=kw>Don't mention it</b>!","真的不用！但我接受。下次我欠你一次。别客气！"]]},
{title:"电话沟通",sub:"Phone",words:[["pick up","接电话"],["hang up","挂电话"],["leave a message","留言"],["voicemail","语音信箱"],["call back","回电"],["breaking up","信号断断续续"],["low battery","电量低"],["put on hold","等待中"],["transfer","转接"],["speakerphone","免提"],["wrong number","打错了"],["speak up","大声点"],["on mute","静音中"],["extension","分机号"],["bad reception","信号差"],["dial","拨号"]],
conv:[["r","Hello, this is Chen Wei. Can I speak to Sarah, please? Is this a good time?","你好，我是陈伟。能跟Sarah通话吗？现在方便吗？"],
["s","Hi Chen Wei! Yes, fine. But you are <b class=kw>breaking up</b> a little — the <b class=kw>reception</b> is not great here.","嗨陈伟！方便的。但你声音有点断断续续——这边信号不太好。"],
["u","Let me <b class=kw>speak up</b> — is this better? I had a quick question about tomorrow's meeting.","我大声点——好些了吗？关于明天的会议有个小问题。"],
["s","Much better! The meeting is at 10 AM, but my <b class=kw>battery</b> is <b class=kw>low battery</b>. If we get cut off, I will <b class=kw>call back</b> immediately.","好多了！明天上午10点，但我电量低。如果断线，我立刻回电。"],
["u","Okay! If I do not <b class=kw>pick up</b>, just <b class=kw>leave a message</b> on my <b class=kw>voicemail</b>. I will check it right away.","好的！如果我没接，就在我语音信箱留言。我马上查看。"],
["s","Perfect. Actually, can I <b class=kw>transfer</b> you to my colleague? She knows more about tomorrow. Just give me one second — do not <b class=kw>hang up</b>.","完美。其实我能转接给我同事吗？她对明天更了解。等一下——别挂电话。"]]}];
var cur=0;function spk(t){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.85;speechSynthesis.speak(u)}catch(e){}}
function bn(){var h='';for(var i=0;i<S.length;i++)h+='<button class="'+(i===0?'sel':'')+'" data-sc="'+i+'">'+S[i].title+'</button>';document.getElementById('sb').innerHTML=h;document.getElementById('sb').addEventListener('click',function(e){if(e.target.tagName==='BUTTON'){cur=parseInt(e.target.getAttribute('data-sc'));document.querySelectorAll('.bar button').forEach(function(b,j){b.className=j===cur?'sel':''});r()}})}
function r(){var s=S[cur];var h='<h2>📍 '+s.title+'</h2><div class="sub">'+s.sub+' &mdash; '+s.conv.length+'轮 | '+s.words.length+'词</div>';
for(var i=0;i<s.conv.length;i++){var t=s.conv[i],id='t'+i;if(t[0]==='r'){h+='<div class="turn-r" data-en="'+t[1].replace(/\"/g,'&quot;')+'"><span class="sp">📖 礼貌表达（参考）</span>'+t[1]+'<div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文翻译</button><button data-a="sp" data-i="'+id+'">🔊 朗读</button></div><div class="ab" id="cn'+id+'">'+t[2]+'</div></div>'}else if(t[0]==='s'){h+='<div class="turn-sf"><div class="av">💼</div><div class="bb"><span class="sp">对方</span>'+t[1]+'<div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文翻译</button><button data-a="sp" data-i="'+id+'">🔊</button></div><div class="ab" id="cn'+id+'">'+t[2]+'</div></div></div>'}else{h+='<div class="turn-st"><div class="av">🎓</div><div class="bb"><span class="sp">你来说</span><span style="color:#999;font-size:.7em"> 先试着说，想不出再点提示</span><div class="hr"><button data-a="cn" data-i="'+id+'">💡 中文提示</button><button data-a="en" data-i="'+id+'">🔤 英文答案</button><button data-a="sp" data-i="'+id+'">🔊 朗读</button></div><div class="ab" id="cn'+id+'">💬 '+t[2]+'</div><div class="ab" id="en'+id+'">✅ '+t[1]+'</div></div></div>'}}document.getElementById('co').innerHTML=h;
document.getElementById('co').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var a=b.getAttribute('data-a'),i=b.getAttribute('data-i');if(a==='cn'){var el=document.getElementById('cn'+i);if(el)el.classList.toggle('show')}else if(a==='en'){var el=document.getElementById('en'+i);if(el)el.classList.toggle('show')}else if(a==='sp'){var enEl=document.getElementById('en'+i);var txt=enEl?enEl.textContent.replace('✅ ','').trim():'';if(txt)spk(txt.replace(/<[^>]+>/g,''));else{var cnEl=document.getElementById('cn'+i);if(cnEl)spk(cnEl.textContent)}}});
var wh='<h3>📝 核心词汇（'+s.words.length+'个）<br><small style="font-weight:normal;color:#888">点击听发音</small></h3>';for(var k=0;k<s.words.length;k++){wh+='<div class="wrow"><div><span class="en">'+s.words[k][0]+'</span><br><span class="cn">'+s.words[k][1]+'</span></div></div>'}document.getElementById('wp').innerHTML=wh;document.getElementById('wp').addEventListener('click',function(e){var r=e.target.closest('.wrow');if(r){var w=r.querySelector('.en').textContent;spk(w)}})}
bn();r();</script></body></html>
