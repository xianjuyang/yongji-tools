{title:"丢失物品",sub:"Lost Items",words:[["lost and found","失物招领"],["stolen","被偷"],["wallet","钱包"],["police station","警察局"],["police report","警方报告"],["embassy","大使馆"],["emergency passport","紧急护照"],["cancel credit card","挂失信用卡"],["insurance claim","保险理赔"],["CCTV footage","监控录像"],["report","报案"],["misplaced","放错地方"],["valuables","贵重物品"],["tracking device","追踪器"],["description","描述"],["reward","悬赏"]],

["s","I am so sorry! First, <b class=kw>cancel credit card</b>s immediately. Then go to the <b class=kw>police station</b> for a <b class=kw>police report</b> — you will need it for <b class=kw>insurance claim</b>s.","非常抱歉！首先，立刻挂失信用卡。然后去警察局做警方报告——保险理赔需要。"],

["s","Two blocks east — I will write the address. Take your claim tags and any proof of identity. Good luck!","往东两个街区——我写地址给你。带上行李牌和身份证明。祝你好运！"]]},
{title:"交通事故",sub:"Accident",words:[["accident","事故"],["witness","目击者"],["license plate","车牌号"],["ambulance","救护车"],["injured","受伤"],["breathalyzer","酒精测试"],["tow truck","拖车"],["damage","损坏"],["exchange details","交换资料"],["hit and run","肇事逃逸"],["insurance","保险"],["police","警察"],["intersection","十字路口"],["lawyer","律师"],["fine","罚款"],["traffic light","红绿灯"]],

["s","Stay calm. First, call the <b class=kw>police</b>. Then <b class=kw>exchange details</b> with the other driver — <b class=kw>license plate</b>s, <b class=kw>insurance</b>, and contact information. Take photos of the <b class=kw>damage</b>.","保持冷静。首先报警。然后和对方交换资料——车牌、保险和联系方式。拍下损坏情况。"],

["u","I hope the other driver does not do a <b class=kw>hit and run</b>. Did they stay at the scene?","希望对方不是肇事逃逸。他们留在现场了吗？"],
["s","Yes, they are waiting over there. The <b class=kw>police</b> are here now — you will be fine.","是的，在那边等着。警察来了——你会没事的。"]]},
{title:"自然灾害",sub:"Disaster",words:[["earthquake","地震"],["evacuate","疏散"],["emergency exit","紧急出口"],["assembly point","集合点"],["aftershock","余震"],["shelter","避难所"],["first aid kit","急救包"],["stay calm","保持冷静"],["drinking water","饮用水"],["warning siren","警报声"],["fire alarm","火警"],["flashlight","手电筒"],["drop cover hold","蹲下掩护抓牢"],["temporary shelter","临时安置点"],["damage assessment","受损评估"],["relief supplies","救援物资"]],

["u","Should we use the stairs or elevator? I am worried about <b class=kw>aftershock</b>s — is it safe to go back inside?","走楼梯还是电梯？我担心余震——里面还安全吗？"],
["s","Never use elevators during an <b class=kw>earthquake</b>! The <b class=kw>assembly point</b> is in the parking lot. <b class=kw>Aftershock</b>s are possible, so stay there until we do a <b class=kw>damage assessment</b>.","地震绝不能坐电梯！集合点在停车场。余震可能发生，留在那等受损评估。"],

["s","Absolutely not — it is not safe yet. We have <b class=kw>relief supplies</b> at the <b class=kw>shelter</b> — water, blankets, and <b class=kw>first aid kit</b>s. You are safe now.","绝对不行——还不安全。避难所有救援物资——水、毯子和急救包。你现在安全了。"]]},
{title:"求助大使馆",sub:"Embassy",words:[["embassy","大使馆"],["consulate","领事馆"],["consular assistance","领事协助"],["replacement passport","补办护照"],["lost document","遗失证件"],["temporary travel document","临时旅行证"],["visa extension","签证延期"],["notarization","公证"],["proof of identity","身份证明"],["emergency contact","紧急联系"],["stolen property","被盗财物"],["legal assistance","法律援助"],["dual citizenship","双重国籍"],["deportation","遣返"],["detention","拘留"],["appointment","预约"]],
conv:[["r","I need <b class=kw>consular assistance</b>. My passport has been <b class=kw>stolen</b> and I am supposed to fly home in three days. What can I do?","我需要领事协助。护照被偷了，三天后该飞回国。怎么办？"],
["s","Do not panic — this happens more often than you think. Do you have any <b class=kw>proof of identity</b> — a photo of your passport or driver license?","别慌——这比你想象的常见。有身份证明吗——护照照片或驾照？"],
["u","I have a photo of my passport on my phone. Can you issue a <b class=kw>temporary travel document</b>? How long does it take?","我手机里有护照照片。能发临时旅行证吗？要多久？"],

var cur=0;function spk(t){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.85;speechSynthesis.speak(u)}catch(e){}}
