<script>
let mode = 'list', filterIdx = -1;
let twords = [], tidx = 0, tok = 0, tfail = 0, revealed = false;

function h(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function init(){
  if(typeof KET_DATA === 'undefined'){
    document.getElementById('info-bar').textContent = '错误：数据文件加载失败，请确保 ket-data-1-16.js 在同目录下';
    return;
  }
  document.getElementById('info-bar').textContent = KET_DATA.length+'个话题 · '+KET_DATA.reduce((s,t)=>s+t.words.length,0)+'词 · 点击🔊听发音';
  renderTabs();
  render();
}
function renderTabs(){
  var h = '<button class="on" onclick="filterIdx=-1;render()">全部</button>';
  KET_DATA.forEach(function(t,i){ h += '<button onclick="filterIdx='+i+';render()">'+(i+1)+'.'+h(t.title)+'</button>'; });
  document.getElementById('tabs').innerHTML = h;
}
function render(){
  document.getElementById('btn-list').className = mode==='list'?'on':'';
  document.getElementById('btn-test').className = mode==='test'?'on':'';
  var topics = filterIdx===-1 ? KET_DATA : [KET_DATA[filterIdx]];
  var html2 = '';
  topics.forEach(function(t){
    var realIdx = KET_DATA.indexOf(t);
    html2 += '<div class="block open"><div class="hd" data-action="toggle"><div><h3>'+(realIdx+1)+'. '+h(t.title)+'</h3><span class="badge">'+(t.subtitle||'')+' · '+t.words.length+'词</span></div><span>▼</span></div><div class="bd">';
    t.words.forEach(function(w){
      html2 += '<div class="line"><button class="btn" data-w="'+h(w[0])+'" title="发音">🔊</button><span class="en">'+h(w[0])+'</span><span class="ps">'+h(w[1])+'</span><span class="zh">'+h(w[2])+'</span></div>';
    });
    html2 += '</div></div>';
  });
  document.getElementById('main').innerHTML = html2;
  document.getElementById('main').className = mode==='test'?'hide':'';
}
// Click delegation
document.addEventListener('click',function(e){
  var hd = e.target.closest('[data-action=\"toggle\"]');
  if(hd){ hd.parentElement.classList.toggle('open'); return; }
  var b = e.target.closest('.btn'); if(!b) return;
  e.stopPropagation(); e.preventDefault();
  var w = b.getAttribute('data-w');
  if(!w || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(w);
  u.lang='en-US'; u.rate=0.85;
  speechSynthesis.speak(u);
});
// Test mode
function startTest(){
  var sel = document.getElementById('test-topic');
  var val = sel ? sel.value : 'all';
  twords = val==='all' ? KET_DATA.flatMap(function(t){return t.words;}) : KET_DATA[parseInt(val)].words.slice();
  twords.sort(function(){return Math.random()-0.5});
  tidx=0; tok=0; tfail=0; revealed=false;
  showCard(); updateStats();
  document.getElementById('main').className = mode==='test'?'':'hide';
}
function updateStats(){
  var done=tok+tfail, remain=twords.length-tidx;
  var html3 = '<div class="test-sel"><select id="test-topic" onchange="startTest()"><option value="all">全部话题</option>';
  KET_DATA.forEach(function(t,i){ html3 += '<option value="'+i+'">'+h(t.title)+'（'+t.words.length+'词）</option>'; });
  html3 += '</select></div>';
  html3 += '<div class="stats"><div class="st"><div class="n">'+remain+'</div><div class="l">剩余</div></div><div class="st"><div class="n" style="color:#16a34a">'+tok+'</div><div class="l">✓ 认识</div></div><div class="st"><div class="n" style="color:#dc2626">'+tfail+'</div><div class="l">✗ 不认识</div></div><div class="st"><div class="n">'+(done?Math.round(done/(done+remain)*100):0)+'%</div><div class="l">进度</div></div>';
  document.getElementById('main').innerHTML = html3 + '<div id="card-area"></div><div class="btns" id="btns"></div>';
}
function showCard(){
  if(tidx >= twords.length){
    var total = tok+tfail, rate = total?Math.round(tok/total*100):0;
    document.getElementById('card-area').innerHTML = '<div class="end"><div class="emoji">'+(rate>=80?'🎉':rate>=50?'💪':'📖')+'</div><h3>本轮完成！</h3><div class="rate" style="color:'+(rate>=60?'#16a34a':'#dc2626')+'">'+rate+'%</div><p style="color:#888;margin-top:4px">认识 '+tok+' / 不认识 '+tfail+'</p><button onclick="startTest()">🔄 再来一轮</button></div>';
    document.getElementById('btns').innerHTML = '';
    return;
  }
  var w = twords[tidx]; revealed = false;
  document.getElementById('card-area').innerHTML = '<div class="card" id="fc" onclick="reveal()"><div class="hint">点击卡片看答案</div><div class="eword">'+h(w[0])+'</div><div class="etag">'+h(w[1])+'</div><button class="sbtn" data-w="'+h(w[0])+'">🔊</button><div class="cword" id="cn">'+h(w[2])+'</div><div class="tap">👆 点这里看释义</div></div>';
  document.getElementById('btns').innerHTML = '<button class="no" onclick="mark(false)">😞 不认识</button><button class="yes" onclick="mark(true)">😊 认识</button>';
}
function reveal(){
  if(revealed) return; revealed = true;
  var cn = document.getElementById('cn'); if(cn) cn.classList.add('show');
  var fc = document.getElementById('fc'); if(fc) fc.querySelector('.hint').textContent = '认识吗？';
}
function mark(ok){
  if(!revealed){ reveal(); return; }
  if(ok) tok++; else tfail++;
  tidx++; updateStats(); showCard();
}
window.addEventListener('DOMContentLoaded', init);
</script>
