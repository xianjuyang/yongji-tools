:root{--pri:#1a6b5a;--prl:#e8f5f0;--bg:#f8fafb;--card:#fff;--tx:#1e293b;--mu:#94a3b8;--bd:#e5e7eb;--gr:#16a34a;--rd:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx)}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.brand{font-size:14px;font-weight:700;color:var(--pri)}
.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-pri{background:var(--pri);color:#fff}.btn-out{background:#fff;color:var(--pri);border:1.5px solid var(--pri)}
.layout{display:flex;height:calc(100vh - 50px)}
.sidebar{width:200px;min-width:200px;background:var(--card);border-right:1px solid var(--bd);overflow-y:auto;padding:4px}
.ti{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;margin-bottom:1px}
.ti:hover{background:#f1f5f9}.ti.on{background:var(--prl);color:var(--pri);font-weight:700}
.ti .n{font-size:10px;color:var(--mu)}
.main{flex:1;overflow-y:auto;padding:16px 20px}
.passage{background:var(--card);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:16px 20px;margin-bottom:14px;border-left:4px solid var(--pri);font-size:15px;line-height:2.2;color:#475569}
.passage b{color:var(--pri);background:var(--prl);padding:1px 4px;border-radius:3px;cursor:pointer}
.passage b:hover{background:#cce8dc}
.btns{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.words{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-bottom:14px}
.wc{background:var(--card);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.04);transition:transform .1s}
.wc:hover{transform:translateY(-1px)}.wc .em{font-size:30px;min-width:34px;text-align:center}
.wc .en{font-weight:700;font-size:13px}.wc .cn{font-size:11px;color:var(--mu)}
.test{text-align:center;background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.test .big{font-size:80px;margin:16px}.test h3{font-size:15px;margin-bottom:6px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:0 auto}
.to{padding:14px;border:3px solid var(--bd);border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;background:#fff}
.to:hover{border-color:var(--pri);background:var(--prl)}
.to.ok{border-color:var(--gr);background:#f0fdf4;color:#065f46}.to.no{border-color:var(--rd);background:#fef2f2;color:#991b1b}
.score{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center}
.score>div{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center}
.score .big{font-size:64px;margin-bottom:12px}
.sect{font-size:10px;color:var(--mu);padding:8px 12px 2px;font-weight:700;letter-spacing:1px}
@media(max-width:700px){.sidebar{width:130px;min-width:130px}.words{grid-template-columns:1fr 1fr}.tg{grid-template-columns:1fr}}
@media(max-width:450px){.layout{flex-direction:column}.sidebar{width:100%;min-width:0;max-height:130px}}
</style>
</head>

<script>
// Read data from DOM — Chinese stays in HTML, JS only reads text
var TP=[],cur=0,TPD=document.getElementById('_d');
var topics=TPD.querySelectorAll('[data-t]');
for(var i=0;i<topics.length;i++){
  var t=topics[i];
  var words=[];
  var wEls=t.querySelectorAll('[data-e]');
  for(var j=0;j<wEls.length;j++){
    var w=wEls[j];
    words.push({e:w.dataset.e,c:w.dataset.c,i:w.dataset.i,tp:w.dataset.tp});
  }
  TP.push({n:t.dataset.n,u:t.dataset.u,p:t.dataset.p,w:words});
}
TPD.remove(); // clean up hidden data

var syn=window.speechSynthesis,sp=false;
function speak(wd){if(sp){syn.cancel();sp=false;return}var u=new SpeechSynthesisUtterance(wd);u.lang='en-GB';u.rate=0.8;u.onend=function(){sp=false};sp=true;syn.speak(u)}
function speakP(i){if(sp){syn.cancel();sp=false;return}var u=new SpeechSynthesisUtterance(TP[i].p);u.lang='en-GB';u.rate=0.85;u.onend=function(){sp=false};sp=true;syn.speak(u)}
function speakS(i){if(sp){syn.cancel();sp=false;return}var u=new SpeechSynthesisUtterance(TP[i].p);u.lang='en-GB';u.rate=0.55;u.onend=function(){sp=false};sp=true;syn.speak(u)}

function rSide(){var h='',lastU='';for(var i=0;i<TP.length;i++){var t=TP[i];if(t.u!==lastU){h+='<div class="sect">'+t.u+'</div>';lastU=t.u}h+='<div class="ti'+(i===cur?' on':'')+'" onclick="show('+i+')">'+(i+1)+'. '+t.n+'<span class="n">'+t.w.length+'词</span></div>'}document.getElementById('sidebar').innerHTML=h}

function show(i){
  cur=i;rSide();
  var t=TP[i],h='';
  // Highlight vocab words in passage
  var passage=t.p;
  for(var j=0;j<t.w.length;j++){
    var w=t.w[j].e;
    var re=new RegExp('\\b('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')\\b','gi');
    passage=passage.replace(re,'<b>$1</b>');
  }
  h+='<div class="passage">'+passage+'<div class="btns"><button class="btn btn-pri" onclick="speakP('+i+')">朗读文章</button><button class="btn btn-out" onclick="speakS('+i+')">慢速朗读</button></div></div>';
  h+='<div class="words">';
  for(var j=0;j<t.w.length;j++){
    var w=t.w[j];
    h+='<div class="wc" onclick="speak(\''+w.e+'\')"><span class="em">'+w.i+'</span><div><div class="en">'+w.e+' <small style="color:var(--mu)">'+w.tp+'</small></div><div class="cn">'+w.c+'</div></div></div>';
  }
  h+='</div>';
  document.getElementById('main').innerHTML=h;
  document.getElementById('btnTest').style.display='block';
}

var TW=[],ti=0,ts=0;
function startTest(){var t=TP[cur];TW=t.w.slice().sort(function(){return Math.random()-0.5}).slice(0,10);ti=0;ts=0;showQ()}
function showQ(){if(ti>=TW.length){var p=Math.round(ts/TW.length*100);document.getElementById('se').textContent=p>=80?'🎉':p>=60?'👍':'💪';document.getElementById('st').textContent='测试完成';document.getElementById('sr').textContent='得分 '+ts+'/'+TW.length+' ('+p+'%)';document.getElementById('score').style.display='flex';return}var c=TW[ti],ws=[];while(ws.length<3){var r=TP[cur].w[Math.floor(Math.random()*TP[cur].w.length)];if(r.e!==c.e&&!ws.some(function(x){return x.e===r.e}))ws.push(r)}var opts=[c,ws[0],ws[1],ws[2]].sort(function(){return Math.random()-0.5});var h='<div class="test"><h3>图片测试 ('+(ti+1)+'/10)</h3><div class="big">'+c.i+'</div><p style="color:var(--mu);font-size:14px">这个图对应哪个单词？</p><div class="tg">';for(var i=0;i<opts.length;i++){h+='<div class="to" onclick="check(\''+opts[i].e+'\',\''+c.e+'\')" id="to'+i+'">'+opts[i].e+'</div>'}h+='</div></div>';document.getElementById('main').innerHTML=h;document.getElementById('btnTest').style.display='none'}
function check(ans,cor){for(var i=0;i<4;i++){var o=document.getElementById('to'+i);if(!o)continue;o.style.pointerEvents='none';if(o.textContent.trim()===cor)o.classList.add('ok')}if(ans===cor)ts++;else{for(var i=0;i<4;i++){var o=document.getElementById('to'+i);if(o&&o.textContent.trim()===ans)o.classList.add('no')}}ti++;setTimeout(showQ,ans===cor?700:1400)}

// Init
alert('Found '+TP.length+' topics, '+(TP.length>0?TP[0].w.length:0)+' words each');
show(0);

// PWA Service Worker
if('serviceWorker' in navigator){
  var sw='self.addEventListener("install",function(e){e.waitUntil(caches.open("ket-v1").then(function(c){return c.addAll([location.href])}).then(function(){return self.skipWaiting()}))});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))})';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'/'}).catch(function(){});
}
</script>
