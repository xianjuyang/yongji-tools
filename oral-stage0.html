var mode='list',curTopic=0;
var tw=[],ti=0,tok=0,tfail=0,shown=false;
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
(function(){renderTabs();renderList();})();
function renderTabs(){
  var h='<button class="on" onclick="pickTopic(0)">'+esc(DATA[0].title)+'</button>';
  for(var i=1;i<DATA.length;i++) h+='<button onclick="pickTopic('+i+')">'+esc(DATA[i].title)+'</button>';
  document.getElementById('tabs').innerHTML=h;
}
function pickTopic(i){
  curTopic=i;
  var btns=document.querySelectorAll('#tabs button');
  for(var j=0;j<btns.length;j++) btns[j].className=j===i?'on':'';
  if(mode==='list') renderList();else startTest();
}
function renderList(){
  document.getElementById('btn-list').className='on';
  document.getElementById('btn-test').className='';
  var t=DATA[curTopic];
  var h='<div class="block open"><div class="hd" data-action="toggle-topic"><div><h3>'+(curTopic+1)+'. '+esc(t.title)+'</h3><span class="badge">'+t.words.length+'词</span></div><span>▼</span></div><div class="bd">';
  t.words.forEach(function(w){
    h+='<div class="line"><button class="spk" data-w="'+esc(w[0])+'">🔊</button><span class="en">'+esc(w[0])+'</span><span class="ps">'+esc(w[1])+'</span><span class="lv">'+esc(w[2])+'</span></div>';
  });
  h+='</div></div>';
  document.getElementById('main').innerHTML=h;
}
document.addEventListener('click',function(e){
  var hd=e.target.closest('[data-action="toggle-topic"]');
  if(hd){hd.parentElement.classList.toggle('open');return;}
  var b=e.target.closest('.spk,.sbtn');if(!b)return;
  e.stopPropagation();e.preventDefault();
  var w=b.getAttribute('data-w');
  if(!w||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;
  speechSynthesis.speak(u);
});
function switchMode(m){mode=m;if(m==='test')startTest();else renderList();}
function startTest(){
  document.getElementById('btn-list').className='';
  document.getElementById('btn-test').className='on';
  tw=DATA[curTopic].words.slice();
  tw.sort(function(){return Math.random()-0.5});
  ti=0;tok=0;tfail=0;shown=false;
  updateStats();showCard();
}
function updateStats(){
  var done=tok+tfail,rem=tw.length-ti;
  var h='<div class="tsel"><select onchange="curTopic=parseInt(this.value);startTest()">';
  DATA.forEach(function(t,i){h+='<option value="'+i+'"'+(i===curTopic?' selected':'')+'>'+esc(t.title)+'（'+t.words.length+'词）</option>';});

  h+='<div id="card-area"></div><div class="btns" id="btns"></div>';
  document.getElementById('main').innerHTML=h;
}
function showCard(){

  }
  var w=tw[ti];shown=false;
  document.getElementById('card-area').innerHTML='<div class="fc" id="fc" onclick="reveal()"><div class="hint">点击卡片看释义</div><div class="ew">'+esc(w[0])+'</div><div class="ps">'+esc(w[1])+'</div><button class="sbtn" data-w="'+esc(w[0])+'">🔊</button><div class="lv" id="lv">'+esc(w[2])+'</div><div class="tap">👆 点击查看中文释义</div></div>';
  document.getElementById('btns').innerHTML='<button class="no" onclick="mark(false)">😞 不认识</button><button class="mid" data-w="'+esc(w[0])+'">🔊</button><button class="yes" onclick="mark(true)">😊 认识</button>';
}
function reveal(){if(shown)return;shown=true;var lv=document.getElementById('lv');if(lv)lv.classList.add('on');var fc=document.getElementById('fc');if(fc)fc.querySelector('.hint').textContent='释义：';}
function mark(ok){if(!shown){reveal();return;}if(ok)tok++;else tfail++;ti++;updateStats();showCard();}
</script>
</body>
</html>
