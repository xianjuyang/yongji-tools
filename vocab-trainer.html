<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词记忆训练 · Well Talk 永汲教育</title>
<style>
:root{--pri:#1a6b5a;--pri-light:#e8f5f0;--bg:#f6f7f9;--card:#fff;--text:#1e293b;--muted:#94a3b8;--red:#dc2626;--green:#16a34a;--amber:#d97706;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:640px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.page-header{text-align:center;padding:24px 0 8px}
.page-header .logo{display:inline-flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--pri);letter-spacing:2px}
.page-header .logo .dot{width:32px;height:32px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;position:relative}
.page-header .logo .dot::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.45)}
.page-header .logo .dot::after{content:'';position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold-light,#f0d78c)}
.page-header .sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:4px}

/* Topic cards */
.section-title{font-size:15px;font-weight:700;color:var(--text);margin:16px 0 10px;letter-spacing:1px}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topic-card{background:var(--card);border-radius:var(--radius);padding:18px 14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden;border:2px solid transparent}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:var(--pri)}
.topic-card .t-icon{font-size:36px;margin-bottom:6px}
.topic-card .t-name{font-size:13px;font-weight:700;color:var(--text)}
.topic-card .t-count{font-size:11px;color:var(--muted);margin-top:2px}
.topic-card .t-progress{height:3px;background:#e5e7eb;border-radius:2px;margin-top:8px;overflow:hidden}
.topic-card .t-progress-bar{height:100%;background:var(--pri);border-radius:2px;transition:width .3s}
.topic-card .t-badge{position:absolute;top:8px;right:8px;background:var(--pri);color:#fff;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600}
.topic-card.done{border-color:#d1fae5}

/* Flashcard */
.flash-view{display:none}
.flash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.flash-header .back-btn{background:#fff;border:1.5px solid var(--pri);color:var(--pri);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;letter-spacing:0.5px}
.flash-header .back-btn:hover{background:var(--pri-light)}
.flash-header .counter{font-size:13px;color:var(--muted);font-weight:600}
.card-container{perspective:1000px;margin-bottom:20px}

/* Reading card */
.reading-card{background:var(--card);border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.1);padding:28px 24px;margin-bottom:16px;line-height:2.2}
.reading-card .quote-block{text-align:center;padding:20px 16px;margin-bottom:20px;background:linear-gradient(135deg,var(--pri-light),#f0fdf4);border-radius:12px;border-left:4px solid var(--pri)}
.reading-card .quote-text{font-size:20px;font-weight:700;color:var(--pri);font-style:italic;letter-spacing:0.5px;line-height:1.8}
.reading-card .quote-dash{color:var(--muted);font-size:14px;margin-top:6px}
.reading-card .passage-text{font-size:16px;color:var(--text);text-align:justify;padding:0 4px}
.reading-card .passage-text .phonics{background:#fef3c7;border-bottom:2px solid var(--amber);padding:0 2px;border-radius:2px;cursor:pointer;transition:all .15s}
.reading-card .passage-text .phonics:hover{background:#fde68a}
.reading-card .passage-text .phonics.active{background:var(--amber);color:#fff}
.reading-card .word-count{text-align:right;font-size:11px;color:var(--muted);margin-top:12px;letter-spacing:0.5px}
.reading-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.reading-actions .btn{font-size:13px;padding:10px 18px}
.btn-speak{background:var(--pri);color:#fff}
.btn-speak:hover{background:#0f4a3e}
.btn-speak.speaking{background:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.phonics-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;font-size:11px;color:var(--muted)}
.phonics-legend span{padding:3px 8px;border-radius:4px}
.phonics-legend .leg-cvc{background:#dbeafe;color:#1e40af}
.phonics-legend .leg-cvce{background:#ede9fe;color:#6d28d9}
.phonics-legend .leg-digraph{background:#d1fae5;color:#065f46}
.phonics-legend .leg-blend{background:#fef3c7;color:#92400e}

	/* Speed control */
	.speed-control{display:flex;align-items:center;gap:10px;background:#f8fafc;border-radius:20px;padding:8px 14px;margin-top:12px}
	.speed-control .speed-label{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600;letter-spacing:0.5px}
	.speed-control input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--pri-light),var(--pri));border-radius:2px;outline:none;cursor:pointer}
	.speed-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid var(--pri);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:all .15s}
	.speed-control input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);border-color:#0f4a3e}
	.speed-control .speed-val{font-size:12px;font-weight:700;color:var(--pri);min-width:36px;text-align:center}

	/* Word list study view */
	.wordlist-view{display:none}
	.wordlist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
	.wordlist-header .back-btn{background:#fff;border:1.5px solid var(--pri);color:var(--pri);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;letter-spacing:0.5px}
	.wordlist-header .back-btn:hover{background:var(--pri-light)}
	.wordlist-header .wl-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:1px}
	.wordlist-header .wl-count{font-size:12px;color:var(--muted)}
	.wordlist-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
	.wordlist-table thead{background:var(--pri);color:#fff}
	.wordlist-table th{padding:12px 14px;text-align:left;font-size:12px;font-weight:700;letter-spacing:1px}
	.wordlist-table td{padding:11px 14px;font-size:14px;border-bottom:1px solid #f1f5f9}
	.wordlist-table tbody tr:hover{background:#f8fafc}
	.wordlist-table tbody tr:last-child td{border-bottom:none}
	.wordlist-table .wl-col-num{width:40px;text-align:center;color:var(--muted);font-size:12px}
	.wordlist-table .wl-col-en{font-weight:700;color:var(--pri);letter-spacing:0.5px}
	.wordlist-table .wl-col-pos{color:var(--muted);font-size:12px;text-align:center}
	.wordlist-table .wl-col-zh{color:var(--text)}
	.wordlist-table .wl-col-speak{width:44px;text-align:center}
	.wordlist-table .wl-speak-btn{background:none;border:1.5px solid #e5e7eb;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
	.wordlist-table .wl-speak-btn:hover{background:var(--pri);border-color:var(--pri);color:#fff}
	.wordlist-table .wl-speak-btn.playing{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite}
	.wordlist-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
	.wordlist-actions .btn{padding:12px 28px;border-radius:25px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:inherit;transition:all .15s}
	.wordlist-study-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:10px;letter-spacing:0.5px}

/* Reading list */
.reading-list .topic-card .t-desc{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.flash-card{background:var(--card);border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.1);padding:48px 24px;text-align:center;cursor:pointer;min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .25s,box-shadow .25s;position:relative;user-select:none}
.flash-card:hover{transform:scale(1.01);box-shadow:0 12px 40px rgba(0,0,0,.12)}
.flash-card .emoji-display{font-size:100px;line-height:1;margin-bottom:20px;transition:all .3s}
.flash-card .emoji-label{font-size:13px;color:var(--muted);letter-spacing:1px}
.flash-card .word-display{font-size:36px;font-weight:800;color:var(--pri);letter-spacing:1px;margin-bottom:8px;display:none}
.flash-card .pos-display{font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;display:none}
.flash-card .meaning-display{font-size:20px;font-weight:600;color:var(--text);display:none}
.flash-card .tap-hint{font-size:12px;color:#cbd5e1;margin-top:16px;letter-spacing:1px}
.flash-card.revealed .emoji-display{font-size:56px;margin-bottom:10px}
.flash-card.revealed .word-display{display:block}
.flash-card.revealed .pos-display{display:block}
.flash-card.revealed .meaning-display{display:block}
.flash-card.revealed .tap-hint{display:none}

/* Buttons */
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:16px}
.btn{padding:12px 28px;border-radius:25px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:inherit;transition:all .15s}
.btn-wrong{background:#fef2f2;color:var(--red);border:2px solid #fecaca}
.btn-wrong:hover{background:#fee2e2}
.btn-correct{background:#f0fdf4;color:var(--green);border:2px solid #bbf7d0}
.btn-correct:hover{background:#dcfce7}
.btn-skip{background:#f8fafc;color:var(--muted);border:2px solid #e5e7eb}
.btn-skip:hover{background:#f1f5f9}
.btn-pri{background:var(--pri);color:#fff;border:none;width:100%}
.btn-pri:hover{background:#0f4a3e}

/* Progress */
.progress-bar-wrap{background:#e5e7eb;border-radius:6px;height:6px;margin:16px 0 8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--pri);border-radius:6px;transition:width .3s}
.progress-text{font-size:11px;color:var(--muted);text-align:center}

/* Error log */
.error-log{padding:20px 0}
.error-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-radius:10px;margin-bottom:8px;box-shadow:var(--shadow);gap:12px}
.error-item .e-emoji{font-size:28px;flex-shrink:0}
.error-item .e-word{font-weight:700;font-size:15px;color:var(--text);min-width:80px}
.error-item .e-pos{font-size:10px;color:var(--muted)}
.error-item .e-meaning{font-size:13px;color:var(--pri);font-weight:600}
.error-item .e-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;flex-shrink:0}
.error-item .e-remove:hover{color:var(--red)}
.error-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.error-empty .icon{font-size:48px;margin-bottom:10px}

/* Print */
@media print{
  body{background:#fff}
  .container{max-width:100%;padding:0}
  .topbar,.btn-row,.back-btn,.e-remove,.flash-view,.topic-grid,.page-header,.section-title,.reading-actions,.phonics-legend,.flash-header{display:none!important}
  .error-log{display:block!important}
  .error-item{break-inside:avoid;border:1px solid #ddd;box-shadow:none}
  .reading-card{display:block!important;box-shadow:none;border:none;padding:0}
  .reading-card .quote-block{border-left:3px solid #000;background:#f9f9f9}
  .reading-card .passage-text{font-size:14px;line-height:2}
  .reading-card .phonics{background:transparent!important;border-bottom:1px solid #999;color:#000!important}
  #readingView{display:block!important}
  #homeView{display:none!important}
}
/* ===== 话题6子菜单 & 语法视图 ===== */
.t6-submenu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center}
.t6-submenu{background:#fff;border-radius:var(--radius);padding:32px 28px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.t6-submenu h3{font-size:20px;margin-bottom:6px;color:var(--text)}
.t6-submenu .t6-desc{font-size:13px;color:var(--muted);margin-bottom:24px}
.t6-submenu .t6-btn{display:block;width:100%;padding:14px;margin-bottom:10px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text)}
.t6-submenu .t6-btn:hover{border-color:var(--pri);background:var(--pri-light)}
.t6-submenu .t6-btn.primary{background:var(--pri);color:#fff;border-color:var(--pri)}
.t6-submenu .t6-btn.primary:hover{opacity:.9}
.t6-submenu .t6-cancel{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:8px}
/* 语法知识点 */
.grammar-view{position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto;padding:20px}
.grammar-view .gv-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10}
.grammar-view .gv-header button{background:#fff;border:1px solid #ddd;border-radius:20px;padding:8px 18px;font-size:14px;cursor:pointer}
.grammar-view .gv-content{max-width:800px;margin:0 auto;background:#fff;border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.grammar-view .gv-content h2{font-size:22px;margin-bottom:16px;color:var(--pri)}
.grammar-view .gv-content h3{font-size:17px;margin:20px 0 10px;color:var(--text)}
.grammar-view .gv-content table{width:100%;border-collapse:collapse;margin:10px 0 18px;font-size:13px}
.grammar-view .gv-content th,.grammar-view .gv-content td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left}
.grammar-view .gv-content th{background:#f6f7f9;font-weight:600;font-size:12px}
/* 语法测试 */
.grammar-test-view{position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto;padding:20px}
.grammar-test-view .gt-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10}
.grammar-test-view .gt-header button{background:#fff;border:1px solid #ddd;border-radius:20px;padding:8px 18px;font-size:14px;cursor:pointer}
.grammar-test-view .gt-score{font-size:14px;font-weight:700;color:var(--pri);margin-left:auto}
.gt-list{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.gt-item{background:#fff;border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow)}
.gt-item .gt-cn{font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px}
.gt-item .gt-input-wrap{display:flex;gap:8px}
.gt-item .gt-input{flex:1;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.gt-item .gt-input:focus{border-color:var(--pri)}
.gt-item .gt-input.correct{border-color:var(--green);background:#f0fdf4}
.gt-item .gt-input.wrong{border-color:var(--red);background:#fef2f2}
.gt-item .gt-submit{padding:10px 20px;background:var(--pri);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.gt-item .gt-submit:hover{opacity:.9}
.gt-item .gt-feedback{font-size:13px;margin-top:8px;min-height:20px}
.gt-item .gt-feedback.ok{color:var(--green)}
.gt-item .gt-feedback.no{color:var(--red)}
/* 礼花 */
@keyframes firework{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-400px) scale(0);opacity:0}}
@keyframes fireworkBurst{0%{transform:scale(1);opacity:1}100%{transform:scale(0);opacity:0}}
.firework-particle{position:fixed;pointer-events:none;z-index:9999;width:8px;height:8px;border-radius:50%;animation:firework .8s ease-out forwards}
.firework-center{position:fixed;pointer-events:none;z-index:9999;width:40px;height:40px;border-radius:50%;animation:fireworkBurst .6s ease-out forwards}

/* Completed state */
.completed-box{text-align:center;padding:40px 20px}
.completed-box .big-emoji{font-size:64px;margin-bottom:12px}
.completed-box h3{font-size:20px;color:var(--text);margin-bottom:4px}
.completed-box .stats{font-size:13px;color:var(--muted);margin-bottom:16px}

/* Tabs */
.tabs{display:flex;gap:0;margin:16px 0;background:#e5e7eb;border-radius:20px;padding:3px}
.tab-btn{flex:1;padding:8px;text-align:center;border-radius:17px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;color:var(--muted);transition:all .15s}
.tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Home View -->
  <div id="homeView">
    <div class="page-header">
      <div class="logo"><div class="dot"></div>单词记忆训练</div>
      <div class="sub">Oxford 3000 · 按话题分类 · 图片联想记忆</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('study')">📖 学习模式</button>
      <button class="tab-btn" onclick="switchTab('errors')">📝 错题本 <span id="errorCount" style="background:var(--red);color:#fff;padding:1px 7px;border-radius:8px;font-size:10px;display:none">0</span></button>
      <button class="tab-btn" onclick="switchTab('reading')">🎙️ 朗读</button>
      <button class="tab-btn" onclick="switchTab('wordlist')">📋 单词表</button>
    </div>

    <!-- Study tab -->
    <div id="studyTab">
      <div class="section-title">选择话题开始记忆</div>
      <div class="topic-grid" id="topicGrid"></div>
    </div>

    <!-- Error log tab -->
    <div id="errorTab" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn btn-pri" onclick="window.print()" style="flex:1">🖨️ 打印错题本</button>
        <button class="btn btn-skip" onclick="clearErrors()">清空</button>
      </div>
      <div class="error-log" id="errorLog"><div class="error-empty"><div class="icon">🏆</div><p>还没有错题，继续保持！</p></div></div>
    </div>

    <!-- Reading tab -->
    <div id="readingTab" style="display:none">
      <div class="section-title">选择话题开始朗读</div>
      <div class="reading-list" id="readingList"></div>
    </div>

    <!-- Word List tab -->
    <div id="wordlistTab" style="display:none">
      <div class="section-title">选择话题背诵单词</div>
      <div class="topic-grid" id="wordlistTopicGrid"></div>
    </div>
  </div>

  <!-- Reading Detail View -->
  <div class="flash-view" id="readingView">
    <div class="flash-header">
      <button class="back-btn" onclick="goHome()">← 返回</button>
      <span class="counter" id="readingTitle"></span>
    </div>
    <div class="reading-card" id="readingCard"></div>
  </div>

  <!-- Word List Detail View -->
  <div class="wordlist-view" id="wordlistView">
    <div class="wordlist-header">
      <button class="back-btn" onclick="goHome()">← 返回</button>
      <span class="wl-title" id="wordlistTitle"></span>
      <span class="wl-count" id="wordlistCount"></span>
    </div>
    <div class="wordlist-table-wrap" id="wordlistTableWrap"></div>
    <div class="wordlist-actions">
      <button class="btn btn-pri" id="wordlistQuizBtn" style="max-width:300px">✅ 开始测试</button>
      <button class="btn btn-skip" onclick="speakAllWords()">🔊 全部朗读</button>
    </div>
    <p class="wordlist-study-hint">💡 先熟记单词，再点击「开始测试」检测记忆效果</p>
  </div>

  <!-- Flash View -->
  <div class="flash-view" id="flashView">
    <div class="flash-header">
      <button class="back-btn" onclick="goHome()">← 返回</button>
      <span class="counter" id="flashCounter"></span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <p class="progress-text" id="progressLabel"></p>

    <div class="card-container">
      <div class="flash-card" id="flashCard" onclick="revealCard()">
        <div class="emoji-display" id="cardEmoji">🍎</div>
        <div class="emoji-label">点击卡片查看含义</div>
        <div class="word-display" id="cardWord">apple</div>

  topic4:{quote:'An apple a day keeps the doctor away.',dash:'— English Proverb',
    passage:`Let me tell you about my meals. In the morning, I eat breakfast. I like eggs, bread, and milk. I drink a cup of tea or coffee. At noon, I stop for lunch. A sandwich with meat and cheese is quick and good. I may add a salad or some soup. In the evening, I sit down for dinner. This is my big meal of the day. I have rice or potatoes with fish or chicken. I cook them in oil with a bit of salt. I like to eat fruit for dessert — an apple, an orange, or some nuts. A slice of cake or ice cream is a sweet treat, but I save it for special days. Good food keeps me strong and fit. Eating well is the first step to a happy life.`},
  topic5:{quote:'Every cloud has a silver lining.',dash:'— English Proverb',
    passage:`Look up at the sky. What do you see? On a bright day, the sun shines and the sky is clear and blue. The air feels warm and mild. Then a cloud drifts in. The cloud gets big and dark. The wind starts to blow. Rain falls in wet drops. You may hear thunder and see lightning flash — a storm is here! But do not worry. Storms pass. The rain stops, the clouds part, and the sun comes back. In winter, the air gets cold. Water turns to ice, and soft snow falls to the ground. Each season brings its own kind of weather — spring, summer, fall, and winter. The world is always changing above us. Learn to see the good in every sky.`},
  topic6:{quote:'Fine feathers make fine birds.',dash:'— English Proverb',
    passage:`Every day, we put on clothes. A soft T-shirt and jeans for play. A shirt and tie for a formal day. A warm sweater when it is cold. A light dress or skirt when it is hot. We pick shoes — sneakers for a run, boots for the rain, or nice shoes for a suit. A cap keeps the sun off your face. Socks keep your feet warm and dry. Some clothes are made of cotton, soft and light. Some are made of wool, thick and warm. Silk is smooth and shiny. Leather is strong and lasts a long time. The style you pick shows who you are. Do you like a loose fit or a tight fit? Big or small? Pick what makes you feel good. Dress well, feel well.`},
  topic7:{quote:'A cat has nine lives.',dash:'— English Proverb',
    passage:`A dog is a good pet. It can run fast and jump up to greet you. A cat is soft and likes to sleep in the sun. A bird can fly high in the sky with its strong wings. Each feather helps it glide. A fish can swim deep in the water. A horse is big and fast — you can ride it. On a farm, a cow gives milk and a sheep gives wool for warm clothes. A pig likes to eat and rest. In the wild, a bear is big and strong. A lion is the king of the land. A snake has no legs but can climb and slide. A monkey can jump from tree to tree. A frog hops and swims. Even a small insect has a job to do. The world of animals is wide and full of life.`},
  topic8:{quote:'One step at a time.',dash:'— English Proverb',

    passage:`How do you feel right now? Are you happy and full of life? Or are you tired and just want to rest? We feel many things each day. In the morning, you may feel hungry and thirsty. After a big meal, you feel full. When you are sick, you feel weak and in pain. Rest helps you get well and strong again. When you see a friend, you feel excited. When you lose a game, you may feel sad or upset. A loud noise can make you feel afraid or nervous. A kind word can make you feel calm and relaxed. Too much work brings stress. A good laugh makes your heart feel light. Laughter truly is the best medicine.`},
  topic10:{quote:'Actions speak louder than words.',dash:'— English Proverb',
    passage:`Wow! Look at that! Oh, what a beautiful day! People use words like these to show how they feel. When you are amazed, you say "Wow!" or "Incredible!" When you are happy, you say "Great!" or "Fantastic!" When something is bad, you say "Oh no!" or "Terrible!" You say "Please" when you want help. You say "Sorry" when you make a mistake. You say "Thanks!" when someone is kind to you. A simple "Yes" or "No" can say a lot. A warm "Hello!" can make a new friend. A sad "Goodbye" can be hard to say. But words are just the start. What you do is what really counts. So speak with care, and let your actions shine even brighter.`}

// Consonant letter set for phonics patterns
const CONS = '[b-df-hj-np-tv-z]';
// Phonics highlighting patterns (JavaScript-compatible)
const PHONICS = [
  {name:'CVCE',re:new RegExp('\\b'+CONS+'[aeiou]'+CONS+'e\\b','gi'),color:'#ede9fe',text:'#6d28d9',label:'CVCE (a_e,i_e,o_e,u_e)'},
  {name:'Digraph',re:/\b\w*(sh|ch|th|wh|ph|ck|ng|nk)\w*\b/gi,color:'#d1fae5',text:'#065f46',label:'Digraph (sh/ch/th/wh/ph/ck/ng/nk)'},
  {name:'Blend',re:/\b\w*(bl|cl|fl|gl|pl|sl|br|cr|dr|fr|gr|pr|tr|st|sp|sk|sn|sm|sw|spl|spr|str|scr)\w*\b/gi,color:'#fef3c7',text:'#92400e',label:'Blend (辅音连缀)'},
  {name:'CVC',re:new RegExp('\\b'+CONS+'[aeiou]'+CONS+'\\b','gi'),color:'#dbeafe',text:'#1e40af',label:'CVC (辅音+元音+辅音)'}
];

// ==================== STATE ====================
const ERRORS_KEY = 'welltalk_vocab_errors';
const PROGRESS_KEY = 'welltalk_vocab_progress';

let currentTopic = null;
let shuffledWords = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let revealed = false;

function loadErrors(){
  try{return JSON.parse(localStorage.getItem(ERRORS_KEY))||[]}catch(e){return[]}
}
function saveErrors(arr){localStorage.setItem(ERRORS_KEY,JSON.stringify(arr))}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem(PROGRESS_KEY))||{}}catch(e){return{}}
}
function saveProgress(obj){localStorage.setItem(PROGRESS_KEY,JSON.stringify(obj))}

// ==================== RENDER TOPICS ====================
function renderTopics(){
  const grid = document.getElementById('topicGrid');
  const progress = loadProgress();
  grid.innerHTML = TOPICS.map(t => {
    const prog = progress[t.id] || 0; // % of words learned
    const total = t.words.length;
    const doneClass = prog >= 100 ? ' done' : '';
    return `
      <div class="topic-card${doneClass}" onclick="startTopic('${t.id}')">
        ${prog >= 100 ? '<span class="t-badge">✓</span>' : ''}
        <div class="t-icon">${t.icon}</div>
        <div class="t-name">${t.name}</div>
        <div class="t-count">${t.sub} · ${total}词</div>
        <div class="t-progress"><div class="t-progress-bar" style="width:${prog}%"></div></div>
      </div>`;
  }).join('');
  updateErrorBadge();
}

// ==================== START TOPIC ====================
function startTopic(topicId){
  currentTopic = TOPICS.find(t => t.id === topicId);
  if(!currentTopic) return;
  // Shuffle words
  shuffledWords = [...currentTopic.words].sort(()=>Math.random()-.5);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  revealed = false;

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('flashView').style.display = 'block';
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('completedBox').style.display = 'none';
  document.getElementById('flashCard').classList.remove('revealed');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressLabel').textContent = '';

  renderCard();
}

function renderCard(){
  if(currentIndex >= shuffledWords.length){
    showCompleted();
    return;
  }
  revealed = false;
  const word = shuffledWords[currentIndex];
  document.getElementById('cardEmoji').textContent = word.e;
  document.getElementById('cardWord').textContent = word.w;
  document.getElementById('cardPos').textContent = word.p;
  document.getElementById('cardMeaning').textContent = word.m;
  document.getElementById('flashCard').classList.remove('revealed');
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('flashCounter').textContent = `${currentIndex + 1} / ${shuffledWords.length}`;

  // Progress
  const pct = Math.round(currentIndex / shuffledWords.length * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  const remain = shuffledWords.length - currentIndex;
  document.getElementById('progressLabel').textContent = `还剩 ${remain} 个单词`;
}

function revealCard(){
  if(revealed) return;
  revealed = true;
  document.getElementById('flashCard').classList.add('revealed');
  document.getElementById('actionBtns').style.display = 'flex';
}

function markCorrect(){
  if(!revealed) return;
  correctCount++;
  nextCard();
}

function markWrong(){
  if(!revealed) return;
  wrongCount++;
  const word = shuffledWords[currentIndex];
  // Add to error log
  const errors = loadErrors();
  if(!errors.find(e => e.w === word.w && e.topicId === currentTopic.id)){
    errors.push({w:word.w, p:word.p, m:word.m, e:word.e, topicId:currentTopic.id, topicName:currentTopic.name, time:new Date().toISOString()});
    saveErrors(errors);
  }
  nextCard();
}

function nextCard(){
  currentIndex++;
  if(currentIndex >= shuffledWords.length){
    showCompleted();
  }else{
    renderCard();
  }
}

function showCompleted(){
  document.getElementById('flashCard').classList.remove('revealed');
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = '';
  document.getElementById('flashCounter').textContent = '完成！';
  document.getElementById('completedBox').style.display = 'block';
  document.getElementById('roundStats').innerHTML = `
    ✅ 正确：<b>${correctCount}</b> 个 &nbsp;&nbsp;
    ❌ 错误：<b>${wrongCount}</b> 个 &nbsp;&nbsp;
    📊 正确率：<b>${shuffledWords.length > 0 ? Math.round(correctCount/shuffledWords.length*100) : 0}%</b>
  `;

  // Save progress
  const progress = loadProgress();
  progress[currentTopic.id] = Math.round(correctCount / shuffledWords.length * 100);
  saveProgress(progress);
  updateErrorBadge();
}

function retryTopic(){
  if(!currentTopic) return;
  document.getElementById('completedBox').style.display = 'none';
  document.getElementById('flashCard').classList.remove('revealed');
  shuffledWords = [...currentTopic.words].sort(()=>Math.random()-.5);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  revealed = false;
  renderCard();
}

// ==================== ERROR LOG ====================
function renderErrorLog(){
  const errors = loadErrors();
  const container = document.getElementById('errorLog');
  updateErrorBadge();

  if(errors.length === 0){
    container.innerHTML = '<div class="error-empty"><div class="icon">🏆</div><p>还没有错题，继续保持！</p></div>';
    return;
  }

  // Group by topic
  const grouped = {};
  errors.forEach(e => {
    if(!grouped[e.topicId]) grouped[e.topicId] = {name:e.topicName, items:[]};
    grouped[e.topicId].items.push(e);
  });

  let html = '';
  for(const [tid, g] of Object.entries(grouped)){
    html += `<div style="font-size:13px;font-weight:700;color:var(--pri);margin:14px 0 6px;letter-spacing:1px">📌 ${g.name}（${g.items.length}个错题）</div>`;
    g.items.forEach((e,i) => {
      html += `
        <div class="error-item">
          <span class="e-emoji">${e.e}</span>
          <span class="e-word">${e.w}</span>
          <span class="e-pos">${e.p}</span>
          <span class="e-meaning">${e.m}</span>
          <button class="e-remove" onclick="removeError('${tid}','${e.w}')" title="移除">✕</button>
        </div>`;
    });
  }
  container.innerHTML = html;
}

function removeError(topicId, word){
  let errors = loadErrors();
  errors = errors.filter(e => !(e.topicId === topicId && e.w === word));
  saveErrors(errors);
  renderErrorLog();
}

function clearErrors(){
  if(!confirm('确定清空所有错题记录吗？')) return;
  saveErrors([]);
  renderErrorLog();
  updateErrorBadge();
}

function updateErrorBadge(){
  const errors = loadErrors();
  const badge = document.getElementById('errorCount');
  if(errors.length > 0){
    badge.style.display = 'inline';
    badge.textContent = errors.length;
  }else{
    badge.style.display = 'none';
  }
}

function renderReadingList(){
  const list = document.getElementById('readingList');
  list.innerHTML = TOPICS.map(t => {
    const r = READINGS[t.id];

function openReading(topicId){
  const t = TOPICS.find(tp=>tp.id===topicId);
  const r = READINGS[topicId];
  if(!t||!r) return;

  document.getElementById('homeView').style.display='none';
  document.getElementById('readingView').style.display='block';
  document.getElementById('flashView').style.display='none';
  document.getElementById('readingTitle').textContent=t.icon+' '+t.name+' · 朗读';

  // Count words
  const wc = r.passage.split(/\s+/).filter(w=>w.length>0).length;

  let html = `
    <div class="quote-block">
      <div class="quote-text">"${r.quote}"</div>
      <div class="quote-dash">${r.dash}</div>
    </div>
    <div class="reading-actions">
      <button class="btn btn-speak" id="btnSpeak" onclick="toggleSpeak()">🔊 朗读全文</button>
      <button class="btn btn-outline" onclick="speakPassage()">🎧 再读一遍</button>
      <button class="btn btn-skip" onclick="stopSpeak()">⏹ 停止</button>
      <button class="btn btn-skip" onclick="window.print()">🖨️ 打印</button>
    </div>
    <div class="speed-control">
      <span class="speed-label">🐢 慢</span>
      <input type="range" min="0.4" max="1.5" step="0.05" value="0.85" oninput="changeSpeed(this.value)">
      <span class="speed-label">快 🐇</span>

    </div>
    <div class="phonics-legend">
      <span class="leg-cvc">🟦 CVC (辅音+元音+辅音)</span>
      <span class="leg-cvce">🟪 CVCE (元音+辅音+e)</span>
      <span class="leg-digraph">🟩 Digraph (双字母组合)</span>
      <span class="leg-blend">🟨 Blend (辅音连缀)</span>
    </div>
    <div class="passage-text" id="passageText">${highlightPhonics(r.passage)}</div>
    <div class="word-count">📊 ${wc} 词 · ${t.name}话题</div>
  `;

  document.getElementById('readingCard').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function highlightPhonics(text){
  // Escape HTML
  let result = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Split text into tokens: words, punctuation, spaces
  let tokens = result.split(/(\s+|[.,!?;:"'()—–-])/);

  // For each token, try matching phonics patterns
  let highlighted = tokens.map(token => {
    // Only process pure alphabetic tokens
    if(!/^[a-zA-Z]+$/.test(token)) return token;

    let w = token;
    // Apply patterns in priority order: CVCE first (longest match), then Digraph, Blend, CVC last
    for(let pi = 0; pi < PHONICS.length; pi++){
      let p = PHONICS[pi];
      // Test without 'g' flag side effects by creating a new regex copy
      let testRe = new RegExp(p.re.source, 'i');
      if(testRe.test(w)){
        return '<span class="phonics" style="background:'+p.color+';color:'+p.text+'" title="'+p.label+': '+w+'">'+w+'</span>';
      }
    }
    return w;
  });

  return highlighted.join('');
}

let speaking = false;
let utterance = null;
let readingRate = 0.85;

function toggleSpeak(){
  if(speaking){stopSpeak()}else{speakPassage()}
}

function speakPassage(){
  stopSpeak();
  const t = TOPICS.find(tp=>document.getElementById('readingTitle').textContent.includes(tp.name));
  const topicId = t ? t.id : null;
  if(!topicId) return;
  const r = READINGS[topicId];
  if(!r) return;

  // Quote + passage
  const text = r.quote + '. ' + r.passage;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = readingRate;
  utterance.pitch = 1;
  utterance.onstart = ()=>{
    speaking = true;
    const btn = document.getElementById('btnSpeak');
    if(btn){btn.textContent='⏸ 朗读中...';btn.classList.add('speaking')}
  };
  utterance.onend = ()=>{
    speaking = false;
    const btn = document.getElementById('btnSpeak');
    if(btn){btn.textContent='🔊 朗读全文';btn.classList.remove('speaking')}
  };
  utterance.onerror = ()=>{
    speaking = false;
    const btn = document.getElementById('btnSpeak');
    if(btn){btn.textContent='🔊 朗读全文';btn.classList.remove('speaking')}
  };
  speechSynthesis.speak(utterance);
}

function stopSpeak(){
  speechSynthesis.cancel();
  speaking = false;
  const btn = document.getElementById('btnSpeak');
  if(btn){btn.textContent='🔊 朗读全文';btn.classList.remove('speaking')}
}

function changeSpeed(val){
  readingRate = parseFloat(val);
  document.getElementById('speedVal').textContent = val + '×';
  // If currently speaking, re-speak with new rate
  if(speaking){
    const t = TOPICS.find(tp=>document.getElementById('readingTitle').textContent.includes(tp.name));
    const topicId = t ? t.id : null;
    if(topicId){
      speechSynthesis.cancel();
      const r = READINGS[topicId];
      if(!r) return;
      const text = r.quote + '. ' + r.passage;
      utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = readingRate;
      utterance.pitch = 1;
      utterance.onstart = ()=>{
        speaking = true;
        const btn = document.getElementById('btnSpeak');
        if(btn){btn.textContent='⏸ 朗读中...';btn.classList.add('speaking')}
      };
      utterance.onend = ()=>{
        speaking = false;
        const btn = document.getElementById('btnSpeak');
        if(btn){btn.textContent='🔊 朗读全文';btn.classList.remove('speaking')}
      };
      utterance.onerror = ()=>{
        speaking = false;
        const btn = document.getElementById('btnSpeak');
        if(btn){btn.textContent='🔊 朗读全文';btn.classList.remove('speaking')}
      };
      speechSynthesis.speak(utterance);
    }
  }
}

let wlSpeaking = false;
let wlUtterance = null;
let wlCurrentTopicId = null;

function renderWordListTopics(){
  const grid = document.getElementById('wordlistTopicGrid');
  grid.innerHTML = TOPICS.map(t => {
    return `

function openWordList(topicId){
  const t = TOPICS.find(tp=>tp.id===topicId);
  if(!t) return;
  wlCurrentTopicId = topicId;
  stopWLSpeak();

  document.getElementById('homeView').style.display='none';
  document.getElementById('wordlistView').style.display='block';
  document.getElementById('flashView').style.display='none';
  document.getElementById('readingView').style.display='none';
  document.getElementById('wordlistTitle').textContent=t.icon+' '+t.name;
  document.getElementById('wordlistCount').textContent='共 '+t.words.length+' 词';
  document.getElementById('wordlistQuizBtn').onclick = function(){ startTopic(topicId); };

  let html = `<table class="wordlist-table">
    <thead><tr><th class="wl-col-num">#</th><th class="wl-col-en">单词</th><th class="wl-col-pos">词性</th><th class="wl-col-zh">中文</th><th class="wl-col-speak">🔊</th></tr></thead>
    <tbody>`;
  t.words.forEach((w,i)=>{
    html += `<tr>
      <td class="wl-col-num">${i+1}</td>
      <td class="wl-col-en">${w.w}</td>
      <td class="wl-col-pos">${w.p}</td>
      <td class="wl-col-zh">${w.m}</td>
      <td class="wl-col-speak"><button class="wl-speak-btn" id="wlSpeak${i}" onclick="event.stopPropagation();speakWord(${i})" title="朗读">🔊</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('wordlistTableWrap').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function speakWord(index){
  const t = TOPICS.find(tp=>tp.id===wlCurrentTopicId);
  if(!t || index >= t.words.length) return;

  // Stop any ongoing WL speech
  speechSynthesis.cancel();
  wlSpeaking = false;
  // Clear all playing buttons
  document.querySelectorAll('.wl-speak-btn.playing').forEach(b=>b.classList.remove('playing'));

  const word = t.words[index];
  const utterance = new SpeechSynthesisUtterance(word.w);
  utterance.lang = 'en-US';
  utterance.rate = readingRate;
  utterance.pitch = 1;

  const btn = document.getElementById('wlSpeak'+index);
  utterance.onstart = ()=>{ wlSpeaking = true; if(btn) btn.classList.add('playing'); };
  utterance.onend = ()=>{ wlSpeaking = false; if(btn) btn.classList.remove('playing'); };
  utterance.onerror = ()=>{ wlSpeaking = false; if(btn) btn.classList.remove('playing'); };

  speechSynthesis.speak(utterance);
}

function speakAllWords(){
  const t = TOPICS.find(tp=>tp.id===wlCurrentTopicId);
  if(!t) return;

  speechSynthesis.cancel();
  wlSpeaking = false;
  document.querySelectorAll('.wl-speak-btn.playing').forEach(b=>b.classList.remove('playing'));

  // Build a queue and speak one by one
  let idx = 0;
  function speakNext(){
    if(idx >= t.words.length){ wlSpeaking = false; return; }
    const word = t.words[idx];
    const utterance = new SpeechSynthesisUtterance(word.w);
    utterance.lang = 'en-US';
    utterance.rate = readingRate;
    utterance.pitch = 1;

    const btn = document.getElementById('wlSpeak'+idx);
    utterance.onstart = ()=>{ wlSpeaking = true; if(btn) btn.classList.add('playing'); };
    utterance.onend = ()=>{
      if(btn) btn.classList.remove('playing');
      idx++;
      speakNext();
    };
    utterance.onerror = ()=>{
      if(btn) btn.classList.remove('playing');
      idx++;
      speakNext();
    };
    speechSynthesis.speak(utterance);
  }
  speakNext();
}

function stopWLSpeak(){
  speechSynthesis.cancel();
  wlSpeaking = false;
  document.querySelectorAll('.wl-speak-btn.playing').forEach(b=>b.classList.remove('playing'));
}

// ==================== INIT ====================
renderTopics();
</script>

let gtScore = 0; let gtDone = new Set();

function showGrammarTest(){
  hideT6Submenu();
  gtScore = 0; gtDone = new Set();
  document.getElementById('gtScore').textContent = '0/' + grammarTestData.length;
  const list = document.getElementById('gtList');
  list.innerHTML = grammarTestData.map((item,i) => '<div class="gt-item" id="gtItem'+i+'"><div class="gt-cn">'+(i+1)+'. '+item.cn+'</div><div class="gt-input-wrap"><input class="gt-input" id="gtInput'+i+'" placeholder="输入对应的英文句子..." autocomplete="off"><button class="gt-submit" onclick="checkGrammarAnswer('+i+')">提交</button></div><div class="gt-feedback" id="gtFb'+i+'"></div></div>').join('');
  document.getElementById('grammarTestView').style.display = 'block';
}
function hideGrammarTest(){
  document.getElementById('grammarTestView').style.display = 'none';
}
function firework(x,y,color){
  const colors = color ? [color] : ['#e87a3e','#f5c842','#ff6b6b','#51cf66','#6b9bc4','#ff922b','#e599f7','#20c997'];
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'firework-particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width = (4+Math.random()*10)+'px';
    p.style.height = p.style.width;
    const angle = Math.random()*Math.PI*2;
    const dist = 50+Math.random()*200;
    p.style.animation = 'firework '+(0.5+Math.random()*0.8)+'s ease-out forwards';
    p.style.transform = 'translate('+Math.cos(angle)*dist+'px,'+Math.sin(angle)*dist+'px)';
    document.body.appendChild(p);
    setTimeout(function(){ p.remove(); }, 1000);
  }
}
function checkGrammarAnswer(i){
  if(gtDone.has(i)) return;
  var input = document.getElementById('gtInput'+i);
  var fb = document.getElementById('gtFb'+i);
  var userAns = input.value.trim();
  var correct = grammarTestData[i].en.trim();
  function normalize(s){ return s.replace(/\s+/g,' ').replace(/['‘’]/g,"'").replace(/["“”]/g,'"').toLowerCase(); }
  if(normalize(userAns) === normalize(correct)){
    gtDone.add(i); gtScore++;
    input.classList.add('correct'); input.classList.remove('wrong');
    fb.textContent = '✅ 完全正确！太棒了！';
    fb.className = 'gt-feedback ok';
    document.getElementById('gtScore').textContent = gtScore + '/' + grammarTestData.length;
    var rect = input.getBoundingClientRect();
    firework(rect.left+rect.width/2, rect.top, '#51cf66');
    if(gtScore === grammarTestData.length){
      setTimeout(function(){
        var c = document.getElementById('grammarTestView').getBoundingClientRect();
        firework(c.left+c.width/2, c.top+c.height/2, '#e87a3e');
        setTimeout(function(){ firework(c.left+c.width/3, c.top+c.height/3, '#f5c842'); }, 300);
        setTimeout(function(){ firework(c.left+c.width*2/3, c.top+c.height/3, '#ff6b6b'); }, 600);
      }, 600);
    }
  } else {
    input.classList.add('wrong'); input.classList.remove('correct');
    fb.textContent = '❌ 不完全正确，再检查一下？';
    fb.className = 'gt-feedback no';
  }
}
