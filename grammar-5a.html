<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外研版五年级上册 · 语法练习</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(135deg,#e8f5e9 0%,#c8e6c9 50%,#a5d6a7 100%);min-height:100vh;color:#333;line-height:1.6}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#e8f5e9}
::-webkit-scrollbar-thumb{background:#2e7d32;border-radius:4px}

/* ===== CONTAINER ===== */
.container{max-width:900px;margin:0 auto;padding:12px}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#1b5e20,#2e7d32,#388e3c);color:#fff;text-align:center;padding:24px 16px 20px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(46,125,50,0.35);position:relative;margin-bottom:16px}
.header h1{font-size:clamp(1.3rem,3vw,1.9rem);font-weight:800;letter-spacing:1px}
.header .subtitle{font-size:0.9rem;opacity:0.9;margin-top:4px;font-weight:400}
.header .decor{position:absolute;font-size:2rem;opacity:0.2}
.header .decor.left{left:12px;top:50%;transform:translateY(-50%)}
.header .decor.right{right:12px;top:50%;transform:translateY(-50%)}

/* ===== MODULE NAV ===== */
.module-nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;position:sticky;top:8px;z-index:100;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:10px 8px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.module-nav button{background:#fff;border:2px solid #2e7d32;color:#2e7d32;padding:7px 11px;border-radius:20px;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.25s;white-space:nowrap;font-family:inherit}
.module-nav button:hover{background:#2e7d32;color:#fff;transform:translateY(-2px);box-shadow:0 3px 10px rgba(46,125,50,0.3)}
.module-nav button.active{background:#2e7d32;color:#fff;box-shadow:0 3px 12px rgba(46,125,50,0.4)}
.module-nav button.completed{background:#c8e6c9;border-color:#4caf50;color:#1b5e20}
.module-nav button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px;vertical-align:middle}
.module-nav button .dot.green{background:#4caf50}
.module-nav button .dot.yellow{background:#ffc107}
.module-nav button .dot.gray{background:#bbb}

/* ===== SECTION ===== */
.module-section{display:none;animation:fadeSlide 0.4s ease}
.module-section.active{display:block}

/* ===== CARDS ===== */
.card{background:#fff;border-radius:16px;padding:20px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border-left:5px solid #2e7d32;transition:all 0.3s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1);transform:translateY(-1px)}
.card.grammar{border-left-color:#2e7d32}
.card.quiz{border-left-color:#ff9800}
.card.score-card{border-left-color:#4caf50;text-align:center}

.card h2{font-size:1.2rem;color:#2e7d32;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .emoji{font-size:1.5rem}
.card h3{font-size:1.05rem;color:#1b5e20;margin:14px 0 8px;padding-bottom:4px;border-bottom:2px dashed #c8e6c9}
.card .subtitle-text{color:#666;font-size:0.85rem;margin-bottom:8px}

/* Grammar explanation styles */
.grammar-box{background:#f1f8e9;border-radius:12px;padding:14px 16px;margin:10px 0;border:1px solid #c8e6c9}
.grammar-box p{margin:6px 0;font-size:0.92rem}
.grammar-box .highlight{background:#fff9c4;padding:1px 4px;border-radius:3px;font-weight:600;color:#e65100}
.grammar-box .en{color:#2e7d32;font-weight:600;font-style:italic}
.example-list{list-style:none;padding:0}
.example-list li{background:#fff;margin:5px 0;padding:8px 12px;border-radius:8px;border-left:3px solid #66bb6a;font-size:0.9rem}
.example-list li .en-text{color:#2e7d32;font-weight:600}
.example-list li .cn-text{color:#888;font-size:0.82rem;margin-left:8px}
.mistake-box{background:#fff3e0;border-radius:12px;padding:12px 16px;margin:10px 0;border:1px solid #ffe0b2}
.mistake-box p{margin:4px 0;font-size:0.9rem}
.mistake-box .wrong{color:#c62828;text-decoration:line-through}
.mistake-box .right{color:#2e7d32;font-weight:600}
.tip-box{background:#e3f2fd;border-radius:12px;padding:12px 16px;margin:10px 0;border:1px solid #bbdefb}
.tip-box p{margin:4px 0;font-size:0.9rem;color:#0d47a1}
.rhyme-box{background:linear-gradient(135deg,#fff9c4,#fff176);border-radius:12px;padding:12px 16px;margin:10px 0;text-align:center;font-weight:700;color:#e65100;font-size:0.95rem;border:2px dashed #ffcc02}

/* ===== QUIZ QUESTIONS ===== */
.question-block{background:#fafafa;border-radius:12px;padding:14px 16px;margin:10px 0;border:2px solid #e0e0e0;transition:all 0.3s}
.question-block.correct{border-color:#4caf50;background:#e8f5e9;animation:correctPulse 0.5s}
.question-block.wrong{border-color:#f44336;background:#ffebee;animation:shake 0.5s}
.question-block .q-num{display:inline-block;background:#2e7d32;color:#fff;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;font-size:0.8rem;font-weight:700;margin-right:8px}
.question-block .q-text{font-size:0.95rem;font-weight:500;margin-bottom:8px;display:inline}
.question-block .q-status{float:right;font-size:1.2rem}
.question-block .q-type-label{font-size:0.75rem;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}

.options{margin-left:8px}
.option-btn{display:block;width:100%;text-align:left;padding:9px 14px;margin:4px 0;border:2px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:0.9rem;transition:all 0.2s;font-family:inherit}
.option-btn:hover{border-color:#2e7d32;background:#f1f8e9}
.option-btn.chosen-correct{border-color:#4caf50;background:#c8e6c9;font-weight:600}
.option-btn.chosen-wrong{border-color:#f44336;background:#ffcdd2;font-weight:600}
.option-btn.show-correct{border-color:#4caf50;background:#e8f5e9}
.option-btn:disabled{cursor:default;opacity:0.85}
.option-btn .letter{display:inline-block;width:24px;height:24px;border-radius:50%;background:#e8e8e8;text-align:center;line-height:24px;font-weight:700;margin-right:8px;font-size:0.82rem}

.fill-input{padding:9px 12px;border:2px solid #ddd;border-radius:10px;font-size:0.9rem;width:100%;max-width:300px;transition:all 0.2s;font-family:inherit}
.fill-input:focus{outline:none;border-color:#2e7d32;box-shadow:0 0 0 3px rgba(46,125,50,0.15)}
.fill-input.correct{border-color:#4caf50;background:#e8f5e9}
.fill-input.wrong{border-color:#f44336;background:#ffebee}

.feedback{font-size:0.85rem;margin-top:6px;padding:6px 10px;border-radius:8px;display:none}
.feedback.show{display:block;animation:fadeIn 0.3s}
.feedback.correct-msg{background:#e8f5e9;color:#2e7d32;font-weight:600}
.feedback.wrong-msg{background:#ffebee;color:#c62828;font-weight:600}

.submit-btn{background:#2e7d32;color:#fff;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-weight:600;font-size:0.88rem;transition:all 0.25s;font-family:inherit}
.submit-btn:hover{background:#1b5e20;transform:translateY(-1px);box-shadow:0 3px 10px rgba(46,125,50,0.3)}
.submit-btn:disabled{background:#bbb;cursor:default;transform:none;box-shadow:none}

/* ===== SCORE CARD ===== */
.score-display{font-size:3rem;font-weight:800;color:#2e7d32;margin:10px 0}
.score-stars{font-size:1.8rem;margin:8px 0}
.score-msg{font-size:1rem;color:#666}
.reset-btn{background:#ff9800;color:#fff;border:none;padding:10px 24px;border-radius:20px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all 0.25s;font-family:inherit;margin-top:10px}
.reset-btn:hover{background:#f57c00;transform:translateY(-1px);box-shadow:0 3px 10px rgba(255,152,0,0.3)}
.reset-all-btn{background:#f44336;color:#fff;border:none;padding:10px 24px;border-radius:20px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all 0.25s;font-family:inherit;margin-top:10px;margin-left:8px}
.reset-all-btn:hover{background:#d32f2f;transform:translateY(-1px);box-shadow:0 3px 10px rgba(244,67,54,0.3)}

/* ===== PROGRESS BAR ===== */
.progress-bar-outer{background:#e0e0e0;border-radius:10px;height:12px;margin:10px 0;overflow:hidden}
.progress-bar-inner{height:100%;border-radius:10px;transition:width 0.5s ease;background:linear-gradient(90deg,#4caf50,#2e7d32)}
.progress-text{font-size:0.82rem;color:#666;text-align:center;margin:4px 0}

/* ===== TABS/FILTER ===== */
.tab-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:8px 0}
.tab-btn{padding:6px 12px;border-radius:14px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:0.78rem;transition:all 0.2s;font-family:inherit}
.tab-btn.active{background:#2e7d32;color:#fff;border-color:#2e7d32}

/* ===== FOOTER ===== */
.footer{text-align:center;padding:16px;color:#999;font-size:0.78rem}

/* ===== ANIMATIONS ===== */
@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .container{padding:6px}
  .header{padding:16px 10px 14px;border-radius:0 0 18px 18px}
  .header h1{font-size:1.15rem}
  .card{padding:14px 12px;border-radius:12px}
  .module-nav button{padding:5px 8px;font-size:0.72rem;border-radius:16px}
  .card h2{font-size:1.05rem}
  .grammar-box{padding:10px 12px}
  .option-btn{padding:7px 10px;font-size:0.85rem}
  .fill-input{max-width:100%}
  .score-display{font-size:2.2rem}
}

@media(max-width:400px){
  .header h1{font-size:1rem}
  .module-nav{gap:3px;padding:6px 4px}
  .module-nav button{padding:4px 6px;font-size:0.68rem;border-radius:14px}
  .card{padding:10px 8px}
  .grammar-box p{font-size:0.82rem}
}
</style>
</head>
<body>

<div class="container">

<!-- ===== HEADER ===== -->
<header class="header">
  <span class="decor left">📚</span>
  <h1>外研版五年级上册 · 语法练习</h1>
  <p class="subtitle">小学英语语法闯关训练 | 10大语法专题 | 每模块10道精选题</p>
  <span class="decor right">✏️</span>
</header>

<!-- ===== MODULE NAVIGATION ===== -->
<nav class="module-nav" id="moduleNav"></nav>

<!-- ===== PROGRESS OVERVIEW ===== -->
<div class="card" style="text-align:center;margin-bottom:14px">
  <div style="font-size:0.9rem;color:#666;margin-bottom:4px">📊 学习进度</div>
  <div class="progress-bar-outer" style="max-width:500px;margin:0 auto">
    <div class="progress-bar-inner" id="overallProgressBar" style="width:0%"></div>
  </div>
  <div class="progress-text" id="overallProgressText">已完成 0 / 10 个模块</div>
</div>

<!-- ===== MODULE SECTIONS (generated by JS) ===== -->
<div id="moduleSections"></div>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <p>💚 坚持练习，英语语法一定越来越棒！Fighting! 💚</p>
  <button class="reset-all-btn" onclick="resetAll()" style="margin-top:8px">🔄 全部重置</button>
</footer>

</div><!-- /container -->

<script>
// ===== MODULE DATA =====
const modules = [
  // ========== MODULE 1 ==========
  {
    id: 1,
    emoji: "🕐",
    title: "一般过去时（一）",
    grammar: {
      title: "🕐 一般过去时 — 回到过去的故事时间！",
      body: `
        <div class="grammar-box">
          <p>👋 小朋友们好！今天我们来学习<b>一般过去时</b>。想象一下，你有一台时光机，要讲一件<b>已经发生过</b>的事情，这时候就要用到过去时啦！</p>
          <p>🎯 <b>什么时候用过去时？</b>只要是<em>过去</em>发生的动作或状态 — 昨天的事、上周的事、去年的事，全部都用过去时！</p>
          <p>⏰ <b>时间信号词（看到它们就要用过去时）：</b></p>
          <p><span class="highlight">yesterday</span>（昨天）、<span class="highlight">last Sunday/week/year</span>（上周日/上周/去年）、<span class="highlight">...ago</span>（...以前，如two days ago两天前）、<span class="highlight">then</span>（那时）</p>
        </div>

        <h3>🔧 动词过去式怎么变？</h3>
        <div class="grammar-box">
          <p><b>规则变化（有规律可循）：</b></p>
          <p>1️⃣ 一般动词直接 +<b>ed</b>：work → work<span class="highlight">ed</span>, play → play<span class="highlight">ed</span></p>
          <p>2️⃣ 以e结尾 +<b>d</b>：like → lik<span class="highlight">ed</span>, dance → danc<span class="highlight">ed</span></p>
          <p>3️⃣ 辅音+y 结尾，变y为i +<b>ed</b>：study → stud<span class="highlight">ied</span>, carry → carr<span class="highlight">ied</span></p>
          <p>4️⃣ 重读闭音节，双写尾字母 +<b>ed</b>：stop → stop<span class="highlight">ped</span>, drop → drop<span class="highlight">ped</span></p>
        </div>

        <div class="grammar-box">
          <p><b>不规则变化（需要特别记住！）</b>— 这些是"调皮鬼"，不按规矩来：</p>
          <p>go → <span class="highlight">went</span> | meet → <span class="highlight">met</span> | come → <span class="highlight">came</span> | buy → <span class="highlight">bought</span></p>
          <p>run → <span class="highlight">ran</span> | see → <span class="highlight">saw</span> | do → <span class="highlight">did</span> | have → <span class="highlight">had</span></p>
          <p>eat → <span class="highlight">ate</span> | drink → <span class="highlight">drank</span> | drop → <span class="highlight">dropped</span></p>
          <p>be动词：am/is → <span class="highlight">was</span> | are → <span class="highlight">were</span></p>
        </div>

        <h3>📝 句型公式</h3>
        <div class="grammar-box">
          <p>✅ <b>肯定句：</b>主语 + 动词过去式<br><span class="en">I played football yesterday. 我昨天踢了足球。</span></p>
          <p>❌ <b>否定句：</b>主语 + <span class="highlight">didn't</span> + <b>动词原形</b>（⚠️ 千万别用过去式！）<br><span class="en">I <b>didn't play</b> football. ❌ 不能说 I didn't played!</span></p>
          <p>❓ <b>一般疑问句：</b>Did + 主语 + <b>动词原形</b>？<br><span class="en"><b>Did</b> you <b>play</b> football? — Yes, I did. / No, I didn't.</span></p>
          <p>🔷 <b>含be动词疑问句：</b>Was/Were + 主语 + 其他？<br><span class="en"><b>Was</b> he happy? <b>Were</b> they at home?</span></p>
        </div>

        <div class="rhyme-box">
          🎵 <b>记忆口诀：</b>"did出现，动词现原形；didn't后面，也用原形！" — 记住：did和过去式是"死对头"，有did就没过去式！
        </div>

        <h3>💡 重点例句</h3>
        <ul class="example-list">
          <li><span class="en-text">Did you come back yesterday?</span><span class="cn-text">你昨天回来的吗？</span></li>
          <li><span class="en-text">I dropped my ice cream.</span><span class="cn-text">我把我的冰淇淋弄掉了。</span></li>
          <li><span class="en-text">We bought ice creams.</span><span class="cn-text">我们买了冰淇淋。</span></li>
          <li><span class="en-text">I went to the park with Sam.</span><span class="cn-text">我和Sam去了公园。</span></li>
          <li><span class="en-text">She didn't have breakfast this morning.</span><span class="cn-text">她今天早上没吃早饭。</span></li>
        </ul>

        <h3>⚠️ 常见错误</h3>
        <div class="mistake-box">
          <p>❌ <span class="wrong">I didn't went to school.</span> → ✅ <span class="right">I didn't go to school.</span></p>
          <p>❌ <span class="wrong">Did you played football?</span> → ✅ <span class="right">Did you play football?</span></p>
          <p>❌ <span class="wrong">He goed to the park.</span> → ✅ <span class="right">He went to the park.</span></p>
          <p>❌ <span class="wrong">She was play yesterday.</span> → ✅ <span class="right">She played yesterday.</span></p>
        </div>

        <div class="tip-box">
          <p>🎯 <b>考点提示：</b>考试最爱考"didn't + 动词原形"这个陷阱！看到did/didn't，后面动词一定用原形！还有不规则动词过去式，至少要把课文里出现的记熟哦～</p>
        </div>
      `
    },
    questions: [
      {type:"choice",q:"— ______ you come back yesterday? — Yes, I ______.",opts:["Do / do","Did / did","Did / do","Do / did"],ans:1,explain:"问昨天的事要用Did提问，回答用did。记住：yesterday = 过去时 = did！"},
      {type:"choice",q:"I ______ my ice cream on the ground.",opts:["drop","drops","dropped","dropping"],ans:2,explain:"drop的过去式是dropped（重读闭音节，双写p+ed）。事情已经发生了，用过去式！"},
      {type:"choice",q:"We didn't ______ any bananas yesterday.",opts:["bought","buy","buys","buyed"],ans:1,explain:"口诀：didn't后面用原形！didn't buy是正确的。❌ didn't bought是错的！"},
      {type:"choice",q:"选出正确的一句：",opts:["He went to school yesterday.","He goes to school yesterday.","He didn't went to school.","Did he went to school?"],ans:0,explain:"yesterday提示过去时，go→went。B用了一般现在时，C&D都违反了'did/didn't+原形'规则。"},
      {type:"fill",q:"She ______ (have) a good time last Sunday.",ans:"had",explain:"last Sunday提示过去时，have的过去式是had（不规则变化）。"},
      {type:"fill",q:"They ______ (be) very happy to see us.",ans:"were",explain:"They对应的be动词过去式是were。口诀：I/he/she/it用was，you/we/they用were。"},
      {type:"choice",q:"— What did you ______ for lunch? — I ______ noodles.",opts:["eat / eat","ate / ate","eat / ate","ate / eat"],ans:2,explain:"问句：What did you + 原形 → eat。答句：过去式 → ate。did和过去式不共存！"},
      {type:"choice",q:"我昨天没看到Sam。选出正确翻译：",opts:["I don't see Sam yesterday.","I didn't saw Sam yesterday.","I didn't see Sam yesterday.","I not see Sam yesterday."],ans:2,explain:"yesterday→过去时，否定用didn't+原形see。❌ didn't saw错在用了过去式saw！"},
      {type:"fill",q:"写出go的过去式：______",ans:"went",explain:"go→went 是最常用的不规则动词之一，必须记住！"},
      {type:"choice",q:"— Was Amy at home? — No, she ______.",opts:["isn't","wasn't","didn't","weren't"],ans:1,explain:"问句用Was开头，回答也要用was/wasn't。Amy是第三人称单数，用wasn't。"}
    ]
  },

  // ========== MODULE 2 ==========
  {
    id: 2,
    emoji: "🔢",
    title: "How many / How much 辨析",
    grammar: {
      title: "🔢 How many vs How much — 数得清还是数不清？",
      body: `
        <div class="grammar-box">
          <p>👋 小朋友们，今天我们要学会问"有多少"。但英语里有个秘密：问数量要看东西是<b>可数</b>还是<b>不可数</b>！</p>
          <p>🎯 <b>核心规则：</b></p>
          <p>🔹 <span class="highlight">How many + 可数名词复数</span> → 问"多少个"（可以一个一个数的）</p>
          <p>🔹 <span class="highlight">How much + 不可数名词</span> → 问"多少"（数不清的）</p>
          <p>🔹 <span class="highlight">How much is/are...?</span> → 问价格（多少钱）</p>
        </div>

        <div class="rhyme-box">
          🎵 <b>口诀：</b>"many后面加s（复数），东西能数用many；much后面不拆开，数不清的用much。问价格也用much，How much is it记得住！"
        </div>

        <h3>🍎 常见的可数 vs 不可数名词</h3>
        <div class="grammar-box">
          <p>✅ <b>可数（能数）：</b>apple🍎, banana🍌, book📖, pen🖊, egg🥚, orange🍊, pupil👦, crayon🖍</p>

// ===== STATE =====
let moduleScores = {};
let currentModule = 1;

// Initialize from localStorage
try {
  const saved = localStorage.getItem('grammar5_scores');
  if (saved) moduleScores = JSON.parse(saved);
} catch(e) {}

function saveScores() {
  try { localStorage.setItem('grammar5_scores', JSON.stringify(moduleScores)); } catch(e) {}
}

// ===== BUILD NAV =====
function buildNav() {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = modules.map(m => {
    const score = moduleScores[m.id];
    let dotClass = 'gray';
    let completedClass = '';
    if (score && score.total > 0) {
      const allAnswered = score.answered && score.answered.length === 10;
      if (allAnswered && score.correct === 10) { dotClass = 'green'; completedClass = ' completed'; }
      else if (allAnswered) { dotClass = 'yellow'; }
    }
    return `<button class="mod-nav-btn${completedClass}" data-mod="${m.id}" onclick="switchModule(${m.id})">
      ${m.emoji} ${m.title}<span class="dot ${dotClass}"></span>
    </button>`;
  }).join('');
}

// ===== BUILD SECTIONS =====
function buildSections() {
  const container = document.getElementById('moduleSections');
  container.innerHTML = modules.map(m => buildModuleHTML(m)).join('');
}

function buildModuleHTML(m) {
  const score = moduleScores[m.id];
  const answeredSet = score && score.answered ? new Set(score.answered) : new Set();

  let questionsHTML = m.questions.map((q, qi) => {
    const qId = `${m.id}-${qi}`;
    const answered = answeredSet.has(qi);
    const isCorrect = answered && score.answers && score.answers[qi] === true;
    let statusIcon = '';
    if (answered) statusIcon = isCorrect ? ' ✅' : ' ❌';
    let qBlockClass = '';
    if (answered) qBlockClass = isCorrect ? ' correct' : ' wrong';

    let inputHTML = '';
    if (q.type === 'choice') {
      const letters = ['A','B','C','D'];
      inputHTML = `<div class="options">` + q.opts.map((opt, oi) => {
        let btnClass = '';
        if (answered) {
          if (oi === q.ans) btnClass = ' show-correct';
          if (oi === score.answers && score.answers[qi] === true && oi === q.ans) btnClass = ' chosen-correct';
          else if (oi === score.answers && score.answers[qi] === false && oi !== q.ans) btnClass = ' chosen-wrong';
          // Track what user chose
          if (score.chosen && score.chosen[qi] === oi) {
            if (oi === q.ans) btnClass = ' chosen-correct';
            else btnClass = ' chosen-wrong';
          }
        }
        return `<button class="option-btn${btnClass}" data-mod="${m.id}" data-q="${qi}" data-opt="${oi}" onclick="checkChoice(${m.id},${qi},${oi},this)" ${answered ? 'disabled' : ''}><span class="letter">${letters[oi]}</span>${opt}</button>`;
      }).join('') + `</div>`;
    } else if (q.type === 'fill') {
      const val = answered && score.userAnswers && score.userAnswers[qi] ? score.userAnswers[qi] : '';
      const icls = answered ? (isCorrect ? 'correct' : 'wrong') : '';
      inputHTML = `<input type="text" class="fill-input ${icls}" id="fill-${m.id}-${qi}" placeholder="输入你的答案..." value="${escapeHtml(val)}" ${answered ? 'disabled' : ''}>
        <button class="submit-btn" onclick="checkFill(${m.id},${qi})" ${answered ? 'disabled' : ''}>提交</button>`;
    }

    const typeLabel = q.type === 'choice' ? '选择题' : '填空题';
    let feedbackHTML = '';
    if (answered) {
      const fbClass = isCorrect ? 'correct-msg' : 'wrong-msg';
      const fbText = isCorrect ? '✅ 太棒了！回答正确！' : `❌ 答错了！正确答案是：<b>${q.ans}</b>。${q.explain || ''}`;
      feedbackHTML = `<div class="feedback ${fbClass} show">${fbText}</div>`;
    } else {
      feedbackHTML = `<div class="feedback" id="fb-${m.id}-${qi}"></div>`;
    }

    return `<div class="question-block${qBlockClass}" id="qb-${m.id}-${qi}">
      <div class="q-type-label">${typeLabel} ${qi+1}/10</div>
      <span class="q-num">${qi+1}</span><span class="q-text">${q.q}</span><span class="q-status">${statusIcon}</span>
      ${inputHTML}
      ${feedbackHTML}
    </div>`;
  }).join('');

  return `<section class="module-section${currentModule === m.id ? ' active' : ''}" id="modSec-${m.id}">
    <div class="card grammar">
      <h2><span class="emoji">${m.emoji}</span> Module ${m.id}：${m.title}</h2>
      <p class="subtitle-text">📖 语法小课堂 — 认真学完再做题哦！</p>
      ${m.grammar.body}
    </div>
    <div class="card quiz" id="quizCard-${m.id}">
      <h2><span class="emoji">📝</span> Module ${m.id} 语法闯关（10题）</h2>
      ${questionsHTML}
      <div style="text-align:center;margin-top:16px">
        <button class="submit-btn" onclick="showModuleScore(${m.id})" style="font-size:1rem;padding:10px 28px">📊 查看成绩</button>
        <button class="reset-btn" onclick="resetModule(${m.id})">🔄 重做本模块</button>
      </div>
      <div id="scoreDisplay-${m.id}" style="text-align:center;margin-top:14px;display:none"></div>
    </div>
  </section>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== SWITCH MODULE =====
function switchModule(modNum) {
  currentModule = modNum;
  document.querySelectorAll('.module-section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('modSec-' + modNum);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.mod-nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.mod-nav-btn[data-mod="${modNum}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('modSec-' + modNum).scrollIntoView({behavior:'smooth',block:'start'});
}

// ===== CHECK CHOICE =====
function checkChoice(modNum, qNum, chosen, el) {
  const mod = modules.find(m => m.id === modNum);
  if (!mod) return;
  const q = mod.questions[qNum];
  const correct = q.ans;
  const isCorrect = (chosen === correct);

  // Initialize score tracking
  if (!moduleScores[modNum]) moduleScores[modNum] = {correct:0,total:10,answered:[],answers:{},chosen:{},userAnswers:{}};
  if (!moduleScores[modNum].chosen) moduleScores[modNum].chosen = {};
  if (!moduleScores[modNum].answers) moduleScores[modNum].answers = {};
  if (!moduleScores[modNum].userAnswers) moduleScores[modNum].userAnswers = {};

  if (moduleScores[modNum].answered.includes(qNum)) return; // already answered
  moduleScores[modNum].answered.push(qNum);
  moduleScores[modNum].chosen[qNum] = chosen;
  moduleScores[modNum].answers[qNum] = isCorrect;
  if (isCorrect) moduleScores[modNum].correct++;
  saveScores();
  updateProgress();

  // Disable all option buttons in this question
  const qb = el.closest('.question-block');
  qb.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  // Highlight correct and wrong
  const allBtns = qb.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    const optIdx = parseInt(b.dataset.opt);
    if (optIdx === correct) b.classList.add('show-correct');
  });
  if (isCorrect) {
    el.classList.add('chosen-correct');
    qb.classList.add('correct');
    qb.querySelector('.q-status').textContent = ' ✅';
  } else {
    el.classList.add('chosen-wrong');
    qb.classList.add('wrong');
    qb.querySelector('.q-status').textContent = ' ❌';
  }

  // Show feedback
  const fb = qb.querySelector('.feedback');
  if (fb) {
    fb.classList.add('show');
    if (isCorrect) {
      fb.classList.add('correct-msg');
      fb.innerHTML = '✅ 太棒了！回答正确！' + (q.explain ? ' ' + q.explain : '');
    } else {
      fb.classList.add('wrong-msg');
      fb.innerHTML = `❌ 答错了！正确答案是：<b>${q.opts[correct]}</b>。${q.explain || ''}`;
    }
  }

  // Auto-show score if all answered
  if (moduleScores[modNum].answered.length === 10) {
    setTimeout(() => showModuleScore(modNum), 600);
  }
}

// ===== CHECK FILL =====
function checkFill(modNum, qNum) {
  const input = document.getElementById('fill-' + modNum + '-' + qNum);
  if (!input) return;
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  const mod = modules.find(m => m.id === modNum);
  if (!mod) return;
  const q = mod.questions[qNum];

  // Initialize
  if (!moduleScores[modNum]) moduleScores[modNum] = {correct:0,total:10,answered:[],answers:{},chosen:{},userAnswers:{}};
  if (!moduleScores[modNum].answers) moduleScores[modNum].answers = {};
  if (!moduleScores[modNum].userAnswers) moduleScores[modNum].userAnswers = {};

  if (moduleScores[modNum].answered.includes(qNum)) return;
  moduleScores[modNum].answered.push(qNum);
  moduleScores[modNum].userAnswers[qNum] = userAnswer;

  // Compare answers (case insensitive, trim)
  const correctAns = q.ans.toLowerCase().trim();
  const userAns = userAnswer.toLowerCase().trim();
  let isCorrect = false;

  // Handle multi-answer (comma separated correct answers)
  const correctParts = correctAns.split(',').map(s => s.trim());
  for (const part of correctParts) {
    if (userAns === part) { isCorrect = true; break; }
    // Check if user's answer contains all expected parts
  }
  // Also check if answer contains all comma-separated parts
  if (!isCorrect && correctParts.length > 1) {
    const userParts = userAns.split(/[,，]/).map(s => s.trim());
    isCorrect = correctParts.every(cp => userParts.some(up => up === cp));
  }

  moduleScores[modNum].answers[qNum] = isCorrect;
  if (isCorrect) moduleScores[modNum].correct++;
  saveScores();
  updateProgress();

  const qb = document.getElementById('qb-' + modNum + '-' + qNum);
  const submitBtn = qb.querySelector('.submit-btn');
  if (submitBtn) submitBtn.disabled = true;
  input.disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    qb.classList.add('correct');
    qb.querySelector('.q-status').textContent = ' ✅';
  } else {
    input.classList.add('wrong');
    qb.classList.add('wrong');
    qb.querySelector('.q-status').textContent = ' ❌';
  }

  const fb = qb.querySelector('.feedback');
  if (fb) {
    fb.classList.add('show');
    if (isCorrect) {
      fb.classList.add('correct-msg');
      fb.innerHTML = '✅ 太棒了！回答正确！' + (q.explain ? ' ' + q.explain : '');
    } else {
      fb.classList.add('wrong-msg');
      fb.innerHTML = `❌ 答错了！正确答案是：<b>${q.ans}</b>。${q.explain || ''}`;
    }
  }

  if (moduleScores[modNum].answered.length === 10) {
    setTimeout(() => showModuleScore(modNum), 600);
  }
}

// Also allow Enter key on fill inputs
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const target = e.target;
    if (target.classList.contains('fill-input')) {
      const idParts = target.id.split('-');
      if (idParts.length >= 3) {
        const modNum = parseInt(idParts[1]);
        const qNum = parseInt(idParts[2]);
        checkFill(modNum, qNum);
      }
    }
  }
});

// ===== SHOW MODULE SCORE =====
function showModuleScore(modNum) {
  const score = moduleScores[modNum];
  const display = document.getElementById('scoreDisplay-' + modNum);
  if (!display) return;

  const answered = score ? score.answered.length : 0;
  const correct = score ? score.correct : 0;
  let stars = '';
  if (correct === 10) stars = '🌟🌟🌟🌟🌟';
  else if (correct >= 8) stars = '🌟🌟🌟🌟';
  else if (correct >= 6) stars = '🌟🌟🌟';
  else if (correct >= 4) stars = '🌟🌟';
  else stars = '🌟';

  let msg = '';
  if (answered === 0) msg = '你还没开始做题哦！快来做题吧～';
  else if (answered < 10) msg = `你已经做了 ${answered} 题，还有 ${10-answered} 题没做呢！加油！`;
  else if (correct === 10) msg = '🎉 完美！满分通关！你太厉害了！';
  else if (correct >= 8) msg = '👏 非常棒！继续加油，差一点就满分了！';
  else if (correct >= 6) msg = '👍 不错哦！再复习一下语法点，争取更高分！';
  else msg = '💪 需要多复习一下哦！重新看看语法讲解，再来挑战！';

  display.style.display = 'block';
  display.innerHTML = `
    <div class="score-display">${correct} / 10</div>
    <div class="score-stars">${stars}</div>
    <div class="score-msg">${msg}</div>
    ${answered < 10 ? `<p style="font-size:0.85rem;color:#888;margin-top:6px">⚠️ 你还有 ${10-answered} 道题没有回答</p>` : ''}
  `;
  display.scrollIntoView({behavior:'smooth',block:'center'});
  updateProgress();
}

// ===== RESET MODULE =====
function resetModule(modNum) {
  if (moduleScores[modNum]) {
    delete moduleScores[modNum];
    saveScores();
  }
  // Hide score display
  const display = document.getElementById('scoreDisplay-' + modNum);
  if (display) display.style.display = 'none';
  // Rebuild sections
  buildSections();
  switchModule(modNum);
  updateProgress();
  document.getElementById('modSec-' + modNum).scrollIntoView({behavior:'smooth',block:'start'});
}

// ===== RESET ALL =====
function resetAll() {
  if (confirm('确定要重置所有模块的答案吗？这个操作不能撤销哦！')) {
    moduleScores = {};
    saveScores();
    buildSections();
    buildNav();
    switchModule(1);
    updateProgress();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// ===== UPDATE PROGRESS =====
function updateProgress() {
  const totalModules = modules.length;
  let completedModules = 0;
  modules.forEach(m => {
    const score = moduleScores[m.id];
    if (score && score.answered && score.answered.length === 10) {
      completedModules++;
    }
  });
  const pct = Math.round((completedModules / totalModules) * 100);
  document.getElementById('overallProgressBar').style.width = pct + '%';
  document.getElementById('overallProgressText').textContent = `已完成 ${completedModules} / ${totalModules} 个模块 (${pct}%)`;
  buildNav();
  // Re-highlight current module in nav
  const btn = document.querySelector(`.mod-nav-btn[data-mod="${currentModule}"]`);
  if (btn) btn.classList.add('active');
}

// ===== INIT =====
function init() {
  buildNav();
  buildSections();
  switchModule(1);
  updateProgress();

  // Pre-highlight any previously answered questions
  modules.forEach(m => {
    const score = moduleScores[m.id];
    if (score && score.answered) {
      score.answered.forEach(qNum => {
        const qb = document.getElementById('qb-' + m.id + '-' + qNum);
        if (!qb) return;
        const isCorrect = score.answers && score.answers[qNum] === true;
        if (isCorrect) {
          qb.classList.add('correct');
          qb.querySelector('.q-status').textContent = ' ✅';
        } else {
          qb.classList.add('wrong');
          qb.querySelector('.q-status').textContent = ' ❌';
        }
        // Disable inputs
        qb.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        qb.querySelectorAll('.fill-input').forEach(i => i.disabled = true);
        qb.querySelectorAll('.submit-btn').forEach(b => b.disabled = true);
        if (isCorrect) {
          qb.querySelectorAll('.option-btn').forEach(b => {
            if (parseInt(b.dataset.opt) === m.questions[qNum].ans) b.classList.add('show-correct');
          });
        }
        // Restore chosen state
        if (score.chosen && score.chosen[qNum] !== undefined) {
          const chosen = score.chosen[qNum];
          const correctAns = m.questions[qNum].ans;
          qb.querySelectorAll('.option-btn').forEach(b => {
            const optIdx = parseInt(b.dataset.opt);
            if (optIdx === correctAns) b.classList.add('show-correct');
            if (optIdx === chosen) {
              b.classList.add(chosen === correctAns ? 'chosen-correct' : 'chosen-wrong');
            }
          });
        }
        if (score.userAnswers && score.userAnswers[qNum]) {
          const input = document.getElementById('fill-' + m.id + '-' + qNum);
          if (input) {
            input.value = score.userAnswers[qNum];
            if (isCorrect) input.classList.add('correct');
            else input.classList.add('wrong');
          }
        }
      });
    }
    // Show score display if module was partially/fully done
    const score2 = moduleScores[m.id];
    if (score2 && score2.answered && score2.answered.length > 0) {
      showModuleScore(m.id);
    }
  });
}

// Start the app
init();
</script>
