<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井说 Logo 动效</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b0907; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
  #replay {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(232,122,62,0.15); border: 1px solid rgba(232,122,62,0.3);
    color: #f5efe5; padding: 12px 32px; border-radius: 100px;
    font-size: 14px; cursor: pointer; transition: all 0.3s; z-index: 100;
    font-family: 'PingFang SC', sans-serif; letter-spacing: 0.04em;
  }
  #replay:hover { background: rgba(232,122,62,0.25); }
</style>
</head>
<body>

<canvas id="c"></canvas>
<button id="replay">再看一遍</button>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ===== 场景 =====
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const W = window.innerWidth, H = window.innerHeight;
renderer.setSize(W, H);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 50);
camera.position.z = 12;

// ===== 在 Canvas 上画出"井"字得到像素点 =====
const charCanvas = document.createElement('canvas');
charCanvas.width = 200; charCanvas.height = 200;
const ctx = charCanvas.getContext('2d');
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 160px "PingFang SC","Noto Sans SC","Heiti SC",sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillText('井', 100, 100);

const imgData = ctx.getImageData(0, 0, 200, 200).data;
const CHAR_POINTS = [];
for (let y = 0; y < 200; y += 3) {
  for (let x = 0; x < 200; x += 3) {
    const idx = (y * 200 + x) * 4;
    if (imgData[idx + 3] > 128) {
      CHAR_POINTS.push({ x: (x - 100) / 40, y: -(y - 100) / 40 }); // 映射到 3D 空间
    }
  }
}

// 把字符点分成 4 笔（横1、横2、竖1、竖2——"井"字结构）
const horizontal1 = CHAR_POINTS.filter(p => p.y > 0.8 && p.y < 1.6 && p.x > -1.8 && p.x < 1.8);
const horizontal2 = CHAR_POINTS.filter(p => p.y > -1.6 && p.y < -0.8 && p.x > -1.8 && p.x < 1.8);
const vertical1 = CHAR_POINTS.filter(p => p.x > -0.3 && p.x < 0.3 && p.y > -1.8 && p.y < 1.8);
const vertical2_1 = CHAR_POINTS.filter(p => p.x > -1.8 && p.x < -0.8 && p.y > -1.8 && p.y < 1.8);
const vertical2_2 = CHAR_POINTS.filter(p => p.x > 0.8 && p.x < 1.8 && p.y > -1.8 && p.y < 1.8);
const allStrokes = [horizontal1, vertical1, horizontal2, vertical2_1, vertical2_2];

// 颜色：每个笔划不同色
const strokeColors = [0xe87a3e, 0xd4a040, 0xf5efe5, 0x6b9bc4, 0xc48a8a];

// ===== 为每个笔划创建粒子系统 =====
const allParticles = []; // { mesh3d, target3d, home3d }
const materialPool = [];

allStrokes.forEach((strokePoints, si) => {
  const count = strokePoints.length;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const color = new THREE.Color(strokeColors[si]);

  strokePoints.forEach((p, i) => {
    // 初始位置：随机散布
    const angle = Math.random() * Math.PI * 2;
    const phi2 = Math.random() * Math.PI;
    const radius = 4 + Math.random() * 6;
    positions[i * 3] = Math.sin(phi2) * Math.cos(angle) * radius;
    positions[i * 3 + 1] = Math.sin(phi2) * Math.sin(angle) * radius;
    positions[i * 3 + 2] = Math.cos(phi2) * radius;

    colors[i * 3] = color.r;
    colors[i * 3 + 1] = color.g;
    colors[i * 3 + 2] = color.b;

    allParticles.push({
      home: { x: p.x, y: p.y, z: 0 },
      target: { x: p.x, y: p.y, z: 0 },
    });
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const tex = (() => {
    const sz = 32, c = document.createElement('canvas'); c.width = c.height = sz;
    const ct = c.getContext('2d');
    const g = ct.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
    g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.2, 'rgba(255,255,255,0.8)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.2)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    ct.fillStyle = g; ct.fillRect(0, 0, sz, sz);
    return new THREE.CanvasTexture(c);
  })();

  const mat = new THREE.PointsMaterial({
    size: 0.08, map: tex, vertexColors: true,
    blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.9,
  });
  materialPool.push(mat);

  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
});

// 所有粒子的位置数组引用
const allGeos = [];
scene.children.forEach(child => {
  if (child.isPoints) allGeos.push(child);
});

// ===== 光晕背景 =====
const glowGeo = new THREE.PlaneGeometry(10, 10);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      vec2 center = vUv - 0.5;
      float dist = length(center);
      float alpha = smoothstep(0.45, 0.0, dist) * 0.12;
      alpha *= 0.7 + 0.3 * sin(dist * 20.0 - uTime * 0.5);
      gl_FragColor = vec4(0.91, 0.48, 0.24, alpha);
    }
  `,
  transparent: true, depthWrite: false,
});
const glowPlane = new THREE.Mesh(glowGeo, glowMat);
glowPlane.position.z = -2;
scene.add(glowPlane);

// ===== 状态 =====
let animPhase = 'scatter'; // scatter | converge | hold | wave | done
let phaseStart = 0;
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };

document.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / W - 0.5) * 2;
  mouse.ty = -(e.clientY / H - 0.5) * 2;
});

document.getElementById('replay').addEventListener('click', () => {
  animPhase = 'scatter';
  phaseStart = performance.now() * 0.001;
});

// ===== Easing =====
function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

// ===== 动画 =====
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.001;
  const dt = Math.min(clock.getDelta(), 0.1);

  if (phaseStart === 0) phaseStart = t;
  const elapsed = t - phaseStart;

  // 阶段切换
  if (animPhase === 'scatter' && elapsed > 0.5) { animPhase = 'converge'; phaseStart = t; }
  else if (animPhase === 'converge' && elapsed > 1.6) { animPhase = 'hold'; phaseStart = t; }
  else if (animPhase === 'hold' && elapsed > 0.8) { animPhase = 'wave'; phaseStart = t; }

  mouse.x += (mouse.tx - mouse.x) * 3 * dt;
  mouse.y += (mouse.ty - mouse.y) * 3 * dt;

  // 更新每个粒子的位置
  const phaseElapsed = t - phaseStart;
  let particleIdx = 0;

  allGeos.forEach((pts, geoIdx) => {
    const posArr = pts.geometry.attributes.position.array;

    for (let i = 0; i < posArr.length; i += 3) {
      const home = allParticles[particleIdx];
      let tx = home.home.x, ty = home.home.y, tz = home.home.z;

      if (animPhase === 'scatter') {
        // 保持散落
      } else if (animPhase === 'converge') {
        const progress = easeOutExpo(Math.min(phaseElapsed / 1.2, 1));
        const delay = (geoIdx * 0.15) + (Math.random() * 0.1);
        const p = easeOutExpo(Math.max(0, Math.min((phaseElapsed - delay) / 1.0, 1)));
        posArr[i] += (home.home.x - posArr[i]) * 4 * dt;
        posArr[i + 1] += (home.home.y - posArr[i + 1]) * 4 * dt;
        posArr[i + 2] += (0 - posArr[i + 2]) * 4 * dt;
        continue;
      } else if (animPhase === 'hold') {
        tx = home.home.x; ty = home.home.y; tz = 0;
      } else if (animPhase === 'wave') {
        const wave = Math.sin(t * 4 + home.home.x * 3) * 0.08;
        tx = home.home.x; ty = home.home.y + wave; tz = Math.cos(t * 3 + home.home.y * 2) * 0.06;
      }

      // 平滑移动
      posArr[i] += (tx - posArr[i]) * 5 * dt;
      posArr[i + 1] += (ty - posArr[i + 1]) * 5 * dt;
      posArr[i + 2] += (tz - posArr[i + 2]) * 5 * dt;

      particleIdx++;
    }

    // 鼠标微移
    pts.position.x += (mouse.x * 0.5 - pts.position.x) * 2 * dt;
    pts.position.y += (mouse.y * 0.5 - pts.position.y) * 2 * dt;

    pts.geometry.attributes.position.needsUpdate = true;
  });

  // 光晕
  glowMat.uniforms.uTime.value = t;

  renderer.render(scene, camera);
}

// ===== 响应式 =====
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

animate();
</script>
</body>
</html>
