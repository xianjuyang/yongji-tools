{title:"安检通关",sub:"Security Check",words:[["tray","托盘"],["laptop","笔记本电脑"],["scanner","扫描仪"],["liquid","液体"],["belt","腰带"],["jacket","外套"],["metal detector","金属探测门"],["hand sanitizer","洗手液"],["prescription medicine","处方药"],["electronics","电子设备"],["alarm","警报"],["prohibited","禁止"],["inspection","检查"],["plastic bag","密封袋"],["pat-down","手检"],["confiscate","没收"]],

{title:"登机口候机",sub:"Boarding Gate",words:[["boarding","登机"],["delay","延误"],["connecting flight","转机"],["transfer desk","转机柜台"],["zone","区域"],["priority","优先"],["free Wi-Fi","免费无线网"],["power outlet","电源插座"],["announcement","广播"],["departure lounge","候机厅"],["display screen","显示屏"],["final call","最后召集"],["standby","候补"],["overbooked","超售"],["complimentary","免费的"],["push notification","推送通知"]],

{title:"机上服务",sub:"Onboard Service",words:[["overhead compartment","行李舱"],["blanket","毛毯"],["vegetarian","素食"],["pillow","枕头"],["takeoff","起飞"],["USB port","USB接口"],["armrest","扶手"],["meal","餐食"],["flight attendant","空乘"],["landing","着陆"],["seatbelt","安全带"],["headphones","耳机"],["recline","倾斜"],["turbulence","颠簸"],["lavatory","洗手间"],["window shade","遮光板"]],

["u","The <b class=kw>vegetarian</b> pasta sounds good. Also, could I have some orange juice?","素食意面听起来不错。还有，能给我来点橙汁吗？"],
